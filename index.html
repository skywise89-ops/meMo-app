<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-title" content="meMo">
<title>meMo</title>
<style>
  :root {
    --bg: #0d0d0f; --surface: #18181c; --surface2: #222228;
    --border: rgba(255,255,255,0.08); --accent: #c8a97e; --accent2: #8fa8c8;
    --text: #f0ede8; --text2: #9a9590; --danger: #c87e7e;
    --bubble-me: #2a2118; --bubble-them: #1a1e24;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  .theme-rose {
    --bg: #fff5f7; --surface: #ffffff; --surface2: #fce8ed;
    --border: rgba(220,100,120,0.12); --accent: #d4607a; --accent2: #b07090;
    --text: #2a1018; --text2: #906070; --danger: #c0392b;
    --bubble-me: #fde8ee; --bubble-them: #f8f0f2;
  }
  .theme-skyblue {
    --bg: #f0f6ff; --surface: #ffffff; --surface2: #e4eefa;
    --border: rgba(80,130,220,0.12); --accent: #4a7fd4; --accent2: #6090b8;
    --text: #101828; --text2: #607090; --danger: #c0392b;
    --bubble-me: #ddeeff; --bubble-them: #eef4ff;
  }
  .theme-purple {
    --bg: #f8f4ff; --surface: #ffffff; --surface2: #ede4ff;
    --border: rgba(140,90,220,0.12); --accent: #8a5cd4; --accent2: #a070c8;
    --text: #180e28; --text2: #806090; --danger: #c0392b;
    --bubble-me: #ecdeff; --bubble-them: #f4f0ff;
  }
  .theme-cream {
    --bg: #fdf8f0; --surface: #ffffff; --surface2: #f5ede0;
    --border: rgba(180,140,80,0.12); --accent: #b8904a; --accent2: #8a7060;
    --text: #1e160a; --text2: #806840; --danger: #c0392b;
    --bubble-me: #fdf0d8; --bubble-them: #f8f0e8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, 'Noto Sans KR', sans-serif; }
  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; overflow-x: hidden; }
  .screen.hidden { display: none; }

  /* ── LOGIN ── */
  #loginScreen { background: var(--bg); align-items: center; justify-content: center; gap: 2.5rem; }
  .login-logo { font-size: 3.4rem; font-weight: 200; color: var(--accent); letter-spacing: -2px; }
  .login-logo span { color: var(--accent2); }
  .login-sub { color: var(--text2); font-size: 0.8rem; letter-spacing: 0.15em; }
  .google-btn {
    display: flex; align-items: center; gap: 12px;
    background: white; color: #1f1f1f; border: none; border-radius: 14px;
    padding: 14px 28px; font-size: 1rem; font-weight: 500; cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3); transition: opacity 0.2s, transform 0.1s;
  }
  .google-btn:active { opacity: 0.85; transform: scale(0.97); }
  .google-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
  .login-error { color: var(--danger); font-size: 0.82rem; text-align: center; max-width: 280px; line-height: 1.5; min-height: 1.2em; }

  /* ── LOADING ── */
  #loadingScreen { background: var(--bg); align-items: center; justify-content: center; gap: 1rem; }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text2); font-size: 0.85rem; }

  /* ── TOPBAR ── */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 52px 20px 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .topbar-title { font-size: 1rem; font-weight: 500; }
  .topbar-actions { display: flex; gap: 12px; }
  .icon-btn { background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px; display: flex; align-items: center; border-radius: 8px; transition: color 0.2s; }
  .icon-btn:active { color: var(--accent); }
  .icon-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; }

  /* ── MAIN ── */
  #mainScreen { background: var(--bg); }
  .tab-content { flex: 1; overflow: hidden; position: relative; }
  .tab-pane { position: absolute; inset: 0; display: flex; flex-direction: column; overflow: hidden; }
  .tab-pane.hidden { display: none; }
  .tab-bar { display: flex; background: var(--surface); border-top: 1px solid var(--border); padding-bottom: var(--safe-bottom); flex-shrink: 0; }
  .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 0 8px; background: none; border: none; color: var(--text2); font-size: 0.65rem; cursor: pointer; transition: color 0.2s; }
  .tab-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; }
  .tab-btn.active { color: var(--accent); }

  /* ── CHAT ── */
  .chat-messages { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 16px 12px; display: flex; flex-direction: column-reverse; gap: 8px; width: 100%; }
  .chat-messages::-webkit-scrollbar { display: none; }
  .msg-wrap { display: flex; flex-direction: column; max-width: 78%; }
  .msg-wrap.me { align-self: flex-end; align-items: flex-end; }
  .msg-wrap.them { align-self: flex-start; align-items: flex-start; }
  .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 0.95rem; line-height: 1.5; word-break: break-word; }
  .me .msg-bubble { background: var(--bubble-me); border-bottom-right-radius: 4px; border: 1px solid rgba(200,169,126,0.15); }
  .them .msg-bubble { background: var(--bubble-them); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
  .msg-translation { font-size: 0.78rem; color: var(--text2); margin-top: 4px; padding-left: 8px; border-left: 2px solid var(--accent); }
  .me .msg-translation { border-left: none; border-right: 2px solid var(--accent2); padding-left: 0; padding-right: 8px; text-align: right; }
  .msg-time { font-size: 0.68rem; color: var(--text2); margin-top: 3px; padding: 0 4px; display: flex; align-items: center; gap: 3px; justify-content: flex-end; }
  .read-check { display: inline-flex; align-items: center; }
  .read-check svg { width: 14px; height: 14px; }
  .read-check.read svg { stroke: var(--accent2); }
  .read-check.unread svg { stroke: var(--text2); opacity: 0.5; }
  .msg-sender { font-size: 0.72rem; color: var(--text2); margin-bottom: 3px; padding: 0 4px; }
  .msg-media { max-width: 220px; border-radius: 12px; overflow: hidden; }
  .msg-media img { width: 100%; display: block; cursor: pointer; }
  .msg-media video { width: 100%; display: block; border-radius: 8px; }

  .msg-media-group {
    display: flex; gap: 4px; max-width: 220px;
    overflow-x: auto; overflow-y: hidden;
    scroll-snap-type: x proximity; -webkit-overflow-scrolling: touch;
    border-radius: 4px;
  }
  .msg-media-group::-webkit-scrollbar { display: none; }
  .msg-media-group-item {
    flex: 0 0 auto; width: 130px; height: 140px;
    border-radius: 10px; overflow: hidden; position: relative;
    cursor: pointer; background: var(--surface2);
    scroll-snap-align: start;
  }
  .msg-media-group-item img, .msg-media-group-item video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .msg-media-group-item .play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }
  .msg-media-group-item .play-icon svg { width: 26px; height: 26px; fill: rgba(255,255,255,0.9); }
  .msg-media-group-count {
    position: absolute; bottom: 5px; right: 5px;
    background: rgba(0,0,0,0.55); color: #fff;
    font-size: 0.65rem; padding: 1px 6px; border-radius: 8px;
    line-height: 1.4; pointer-events: none;
  }

  .system-msg { text-align: center; color: var(--text2); font-size: 0.75rem; padding: 4px 0; width: 100%; box-sizing: border-box; }
  .chat-input-wrap { display: flex; align-items: flex-end; gap: 8px; padding: 10px 12px; padding-bottom: calc(10px + var(--safe-bottom)); background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 22px; color: var(--text); padding: 10px 16px; font-size: 0.95rem; outline: none; resize: none; max-height: 120px; min-height: 42px; line-height: 1.4; font-family: inherit; transition: border-color 0.2s; }
  .chat-input:focus { border-color: var(--accent); }
  .chat-send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: opacity 0.2s, transform 0.1s; }
  .chat-send-btn:active { opacity: 0.7; transform: scale(0.93); }
  .chat-send-btn svg { width: 18px; height: 18px; stroke: #0d0d0f; fill: none; stroke-width: 2; }
  .partner-status { font-size: 0.75rem; color: var(--text2); }
  .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #4a7a4a; display: inline-block; margin-right: 6px; }

  /* ── ALBUM ── */
  .album-grid {
    flex: 1; min-height: 0; overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-auto-rows: calc((100vw - 4px) / 3);
    gap: 2px; padding: 2px;
    align-content: start;
  }
  @media (min-width: 600px) {
    .album-grid { grid-template-columns: repeat(4, 1fr); grid-auto-rows: calc((100vw - 6px) / 4); }
  }
  @media (min-width: 1024px) {
    .album-grid { grid-template-columns: repeat(5, 1fr); grid-auto-rows: calc((100vw - 8px) / 5); }
  }
  .album-item { overflow: hidden; position: relative; cursor: pointer; background: var(--surface); }
  .album-item img, .album-item video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .album-item .play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }
  .album-item .play-icon svg { width: 32px; height: 32px; fill: rgba(255,255,255,0.9); }
  .album-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 0.9rem; }

  /* ── LIGHTBOX ── */
  #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  #lightbox.open { opacity: 1; pointer-events: all; }
  #lightbox img, #lightbox video { max-width: 90vw; max-height: 85vh; object-fit: contain; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  #lightbox .close-lb { position: absolute; top: 52px; right: 20px; background: none; border: none; color: white; font-size: 2rem; cursor: pointer; z-index: 101; padding: 8px; }
  #lightbox .lb-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 46px; height: 46px; border-radius: 50%;
    background: rgba(0,0,0,0.35); border: none; color: white;
    font-size: 1.8rem; line-height: 1; cursor: pointer; z-index: 101;
    display: none; align-items: center; justify-content: center;
  }
  #lightbox .lb-prev { left: 12px; }
  #lightbox .lb-next { right: 12px; }
  #lightbox .lb-counter {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.85); font-size: 0.78rem;
    background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 12px;
    display: none; z-index: 101;
  }

  /* ── INCOMING CALL ── */
  #incomingCall { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; }
  #incomingCall.show { display: flex; }
  .incoming-name { font-size: 1.8rem; font-weight: 300; color: var(--accent); }
  .incoming-type { font-size: 0.85rem; color: var(--text2); }
  .incoming-btns { display: flex; gap: 40px; margin-top: 1rem; }
  .inc-btn { width: 72px; height: 72px; border-radius: 50%; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
  .inc-btn svg { width: 28px; height: 28px; stroke: white; fill: none; stroke-width: 1.8; }
  .inc-btn span { font-size: 0.7rem; color: white; }
  .inc-btn.accept { background: #4a7a4a; }
  .inc-btn.reject { background: var(--danger); }

  /* ── PROFILE ── */
  .profile-header { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 20px 0; }
  .profile-avatar-lg { width: 88px; height: 88px; border-radius: 50%; background: var(--surface2); border: 2px solid var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
  .profile-avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
  .profile-section { background: var(--surface); border-radius: 16px; overflow: hidden; }
  .profile-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); gap: 12px; }
  .profile-row:last-child { border-bottom: none; }
  .profile-row-label { font-size: 0.9rem; color: var(--text2); }
  .lang-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 6px 10px; font-size: 0.85rem; outline: none; cursor: pointer; }
  .danger-btn { background: none; border: 1px solid var(--danger); border-radius: 12px; color: var(--danger); padding: 12px; font-size: 0.9rem; cursor: pointer; width: 100%; }
  .danger-btn:active { background: rgba(200,126,126,0.1); }
  .toggle-sw { position: relative; width: 44px; height: 24px; }
  .toggle-sw input { opacity: 0; width: 0; height: 0; }
  .toggle-sw .slider { position: absolute; inset: 0; background: var(--surface2); border-radius: 24px; border: 1px solid var(--border); cursor: pointer; transition: background 0.2s; }
  .toggle-sw .slider::before { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: var(--text2); top: 2px; left: 2px; transition: transform 0.2s, background 0.2s; }
  .toggle-sw input:checked + .slider { background: rgba(200,169,126,0.2); border-color: var(--accent); }
  .toggle-sw input:checked + .slider::before { transform: translateX(20px); background: var(--accent); }

  /* ── 테마 선택 UI ── */
  .theme-row { display: flex; gap: 12px; padding: 4px 0; flex-wrap: wrap; }
  .theme-dot {
    width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
    border: 3px solid transparent; transition: transform 0.15s, border-color 0.15s;
    display: flex; align-items: center; justify-content: center; font-size: 1rem;
    flex-shrink: 0;
  }
  .theme-dot:active { transform: scale(0.88); }
  .theme-dot.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent); }

  /* ── 답장 ── */
  .reply-bar {
    display: none; align-items: center; gap: 8px;
    background: var(--surface2); border-left: 3px solid var(--accent);
    padding: 8px 14px; font-size: 0.8rem; color: var(--text2);
    flex-shrink: 0;
  }
  .reply-bar.show { display: flex; }
  .reply-bar-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .reply-bar-cancel { background: none; border: none; color: var(--text2); font-size: 1.1rem; cursor: pointer; padding: 0 4px; line-height: 1; }
  .msg-quote {
    background: var(--surface2); border-left: 3px solid var(--accent);
    border-radius: 6px; padding: 5px 10px; margin-bottom: 5px;
    font-size: 0.75rem; color: var(--text2);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 100%;
  }
  .me .msg-quote { border-left: none; border-right: 3px solid var(--accent2); text-align: right; }

  /* ── 최신 메시지 버튼 ── */
  .scroll-bottom-btn {
    position: absolute; bottom: 12px; right: 12px;
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text2); cursor: pointer;
    display: none; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 5;
    transition: opacity 0.2s;
    font-size: 1rem;
  }
  .scroll-bottom-btn.show { display: flex; }

  /* ── 날짜 구분선 ── */
  .date-sep {
    text-align: center; padding: 12px 0 4px;
    font-size: 0.7rem; color: var(--text2);
    display: flex; align-items: center; gap: 12px;
    width: 100%; box-sizing: border-box;
  }
  .date-sep::before, .date-sep::after {
    content: ''; flex: 1; height: 1px;
    background: var(--border);
  }

  /* ── 검색바 ── */
  .search-bar {
    display: none; gap: 8px; align-items: center;
    padding: 8px 12px; background: var(--surface);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .search-bar.show { display: flex; }
  .search-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 18px; color: var(--text); padding: 8px 14px;
    font-size: 0.85rem; outline: none; font-family: inherit;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-nav { background: none; border: none; color: var(--text2); font-size: 1.1rem; cursor: pointer; padding: 4px 6px; }
  .search-nav:active { color: var(--accent); }
  .search-count { font-size: 0.75rem; color: var(--text2); white-space: nowrap; }
  .msg-highlight { background: rgba(200,169,126,0.25); border-radius: 8px; }

  /* ── 컨텍스트 메뉴 ── */
  #ctxMenu {
    position: fixed; z-index: 400;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    display: none; flex-direction: column; min-width: 140px;
  }
  #ctxMenu.show { display: flex; }
  .ctx-item {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 18px; background: none; border: none;
    color: var(--text); font-size: 0.9rem; cursor: pointer;
    text-align: left; border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .ctx-item:last-child { border-bottom: none; }
  .ctx-item:active { background: var(--surface2); }
  .ctx-item svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; flex-shrink: 0; }

  /* ── 보관함 탭 ── */
  .archive-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .archive-list::-webkit-scrollbar { display: none; }
  .archive-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 0.9rem; }
  .archive-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px;
    display: flex; flex-direction: column; gap: 6px; position: relative;
  }
  .archive-item-meta { font-size: 0.72rem; color: var(--text2); display: flex; gap: 8px; align-items: center; }
  .archive-item-sender { color: var(--accent); font-weight: 500; }
  .archive-item-text { font-size: 0.92rem; color: var(--text); line-height: 1.5; word-break: break-word; }
  .archive-item-media { max-width: 180px; border-radius: 10px; overflow: hidden; }
  .archive-item-media img { width: 100%; display: block; cursor: pointer; }
  .archive-del {
    position: absolute; top: 10px; right: 12px;
    background: none; border: none; color: var(--text2);
    font-size: 1rem; cursor: pointer; padding: 4px; line-height: 1;
  }
  .archive-del:active { color: var(--danger); }

  #toast { position: fixed; bottom: calc(80px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(10px); background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 20px; font-size: 0.85rem; color: var(--text); z-index: 300; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="loadingScreen" class="screen">
  <div class="spinner"></div>
  <div class="loading-text">연결 중...</div>
</div>

<div id="loginScreen" class="screen hidden">
  <div class="login-logo">me<span>M</span>o</div>
  <div class="login-sub">only for two</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>

<script type="module">
import { initializeApp }                                    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup,
         onAuthStateChanged, signOut }
                                                            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getDatabase, ref, set, push, get, onValue, onChildAdded, onChildChanged,
         onDisconnect, serverTimestamp, query, limitToLast, orderByKey, endBefore } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
import { getStorage, ref as sRef,
         uploadBytesResumable, getDownloadURL }             from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';
import { getMessaging, getToken }                           from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js';

const firebaseConfig = {
  apiKey:            "AIzaSyBSfAOkWJtk41iCLIWkCtG91Hn9Aa44UNA",
  authDomain:        "memo-e366f.firebaseapp.com",
  databaseURL:       "https://memo-e366f-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "memo-e366f",
  storageBucket:     "memo-e366f.firebasestorage.app",
  messagingSenderId: "103854425677",
  appId:             "1:103854425677:web:67e0b818c41b42bc3c7e04"
};

const ALLOWED = {
  'fromkevinjung@gmail.com': { name: 'Kevin', emoji: '🍀', lang: 'ko', partnerEmail: 'momo.021118@gmail.com' },
  'momo.021118@gmail.com':   { name: 'Momo',  emoji: '🌸', lang: 'ja', partnerEmail: 'fromkevinjung@gmail.com' }
};
const ROOM_ID = 'memo_private_room';
// ── [최적화] 한 번에 렌더링할 최대 메시지 수 ──
const MSG_LIMIT = 100;

const app       = initializeApp(firebaseConfig);
const auth      = getAuth(app);
const db        = getDatabase(app);
const storage   = getStorage(app);
const messaging = getMessaging(app);

// ── FCM ──
let notifEnabled = false;
let enterTime = 0;
let swRegistration = null;
let appHasFocus = true;

document.addEventListener('visibilitychange', () => { appHasFocus = document.visibilityState === 'visible'; });
window.addEventListener('blur',  () => { appHasFocus = false; });
window.addEventListener('focus', () => { appHasFocus = true; });

const swReadyPromise = ('serviceWorker' in navigator)
  ? navigator.serviceWorker.register('./firebase-messaging-sw.js')
      .then(reg => { swRegistration = reg; return reg; })
      .catch(err => { console.warn('[SW] 등록 실패:', err); return null; })
  : Promise.resolve(null);

const VAPID_KEY = 'BKvA2crddS7igPxkQbnuVjN93065I97kfjX8AlQ7OJwkOZWzn8XO8yklEbjmSfsYYhz7lwdwiKFc7wxvXOpPNEE';

async function getFCMToken() {
  const reg = await swReadyPromise;
  if (!reg) throw new Error('Service Worker 등록 실패 — firebase-messaging-sw.js를 확인하세요');
  return await getToken(messaging, { vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
}

async function initNotif() {
  const saved  = localStorage.getItem('memo_notif');
  const toggle = document.getElementById('notifToggle');
  if (saved === 'on' && 'Notification' in window && Notification.permission === 'granted') {
    notifEnabled = true;
    toggle.checked = true;
    try {
      const token = await getFCMToken();
      if (token && me) await set(ref(db, `${ROOM_ID}/tokens/${me.name}`), token);
    } catch (e) { console.warn('[FCM] 토큰 갱신 실패:', e); }
  }
}

window.toggleNotif = async function() {
  const toggle = document.getElementById('notifToggle');
  if (toggle.checked) {
    if (!('Notification' in window)) { showToast('이 브라우저는 알림을 지원하지 않아요'); toggle.checked = false; return; }
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      try {
        const token = await getFCMToken();
        if (token) {
          await set(ref(db, `${ROOM_ID}/tokens/${me.name}`), token);
          notifEnabled = true;
          localStorage.setItem('memo_notif', 'on');
          showToast('실시간 푸시 알림이 켜졌습니다.');
        } else { showToast('FCM 토큰을 생성할 수 없습니다.'); toggle.checked = false; }
      } catch (err) {
        console.error('[FCM] Token Error:', err);
        showToast('알림 연동에 실패했습니다: ' + (err.message || err));
        toggle.checked = false;
      }
    } else { toggle.checked = false; showToast('브라우저 설정에서 알림 권한을 허용해주세요.'); }
  } else {
    notifEnabled = false;
    localStorage.setItem('memo_notif', 'off');
    if (me) await set(ref(db, `${ROOM_ID}/tokens/${me.name}`), null);
    showToast('알림이 꺼졌습니다.');
  }
};

function sendLocalNotif(name, body) {
  if (!notifEnabled || appHasFocus) return;
  try {
    const tag = 'memo-' + Date.now();
    if (swRegistration) swRegistration.showNotification('meMo — ' + name, { body, tag });
    else new Notification('meMo — ' + name, { body, tag });
  } catch (e) { console.warn('[Notif]', e); }
}

let me = null, partner = null;
let myLang = 'ko', translateEnabled = true;
let partnerLastRead = 0;
const CHECK_SINGLE = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
const CHECK_DOUBLE = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 6 7 17 2 12"/><polyline points="23 6 12 17"/></svg>`;

function sanitize(str) {
  if (!str) return '';
  if (str.startsWith('http://') || str.startsWith('https://')) return str;
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ── 테마 ──
const THEME_IDS = ['dark','rose','skyblue','purple','cream'];
window.setTheme = function(theme) {
  document.body.className = theme === 'dark' ? '' : `theme-${theme}`;
  localStorage.setItem('memo_theme', theme);
  THEME_IDS.forEach(t => {
    const el = document.getElementById(`t${t}`);
    if (el) el.classList.toggle('active', t === theme);
  });
};
function loadTheme() { setTheme(localStorage.getItem('memo_theme') || 'dark'); }

window.signInWithGoogle = async function() {
  const provider = new GoogleAuthProvider();
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  try { await signInWithPopup(auth, provider); }
  catch(e) { if (e.code !== 'auth/popup-closed-by-user') errEl.textContent = '로그인 중 오류가 발생했습니다. 다시 시도해주세요.'; }
};

let roomEntered = false;
onAuthStateChanged(auth, async user => {
  if (!user) { roomEntered = false; showScreen('loginScreen'); return; }
  if (roomEntered) return;
  const email = user.email;
  const profile = ALLOWED[email];
  if (!profile) {
    await signOut(auth);
    document.getElementById('loginError').textContent = `${email} 은 접근이 허용되지 않은 계정입니다.`;
    showScreen('loginScreen'); return;
  }
  me = { ...profile, email, photoURL: user.photoURL };
  partner = { ...ALLOWED[profile.partnerEmail], email: profile.partnerEmail };
  myLang = localStorage.getItem(`memo_lang_${email}`) || profile.lang;
  translateEnabled = localStorage.getItem('memo_translate') !== 'false';
  roomEntered = true;
  enterRoom();
});

function enterRoom() {
  const meRef = ref(db, `${ROOM_ID}/presence/${me.name}`);
  set(meRef, { online: true, name: me.name, photoURL: me.photoURL || '', ts: serverTimestamp() });
  onDisconnect(meRef).update({ online: false });

  // ── [최적화] 리스너 중복 방지: 함수 참조를 변수에 저장해 재등록 차단 ──
  const onVisibilityChange = () => {
    set(ref(db, `${ROOM_ID}/presence/${me.name}/online`), document.visibilityState === 'visible');
  };
  const onBeforeUnload = () => {
    set(ref(db, `${ROOM_ID}/presence/${me.name}/online`), false);
  };
  document.removeEventListener('visibilitychange', onVisibilityChange);
  window.removeEventListener('beforeunload', onBeforeUnload);
  document.addEventListener('visibilitychange', onVisibilityChange);
  window.addEventListener('beforeunload', onBeforeUnload);

  onValue(ref(db, `${ROOM_ID}/presence/${partner.name}`), snap => {
    const data = snap.val();
    const el = document.getElementById('partnerStatus');
    el.innerHTML = '';
    if (data?.online) {
      const dot = document.createElement('span'); dot.className = 'online-dot'; el.appendChild(dot);
      el.appendChild(document.createTextNode(sanitize(partner.name) + ' 온라인'));
    } else {
      el.textContent = sanitize(partner.name) + ' 오프라인';
    }
  });

  const seenKeys = new Set();
  let latestTheirTs = 0;
  let lastReadTimer = null;
  const container = document.getElementById('chatMessages');

  function updateMyLastRead(ts) {
    if (ts <= 0 || ts === window._myLastReadSent) return;
    clearTimeout(lastReadTimer);
    lastReadTimer = setTimeout(() => {
      window._myLastReadSent = ts;
      set(ref(db, `${ROOM_ID}/lastRead/${me.name}`), ts);
    }, 500);
  }

  // ── [최적화] limitToLast(MSG_LIMIT) — 최근 100개만 실시간 구독 ──
  // 페이지네이션 상태
  let oldestKey = null;
  let isLoadingMore = false;
  let noMoreOldMessages = false;
  const LOAD_MORE = 30;

  const msgsQuery = query(ref(db, `${ROOM_ID}/messages`), limitToLast(MSG_LIMIT));

  onChildAdded(msgsQuery, snap => {
    const key = snap.key;
    if (seenKeys.has(key)) return;
    seenKeys.add(key);
    // onChildAdded는 오래된→최신 순으로 호출되므로 첫 번째 key가 가장 오래됨
    if (oldestKey === null) oldestKey = key;

    const msg = snap.val();
    renderMessage(msg, key);

    if (msg.uid !== me.name && msg.ts > latestTheirTs) {
      latestTheirTs = msg.ts;
      updateMyLastRead(msg.ts);
      if (msg.ts > enterTime) {
        if (msg.type === 'text') sendLocalNotif(msg.name, msg.text);
        else sendLocalNotif(msg.name, mediaLabel(msg));
      }
    }
  });

  // ── 과거 메시지 추가 로드 ──
  async function loadMoreMessages() {
    if (isLoadingMore || noMoreOldMessages || !oldestKey) return;
    isLoadingMore = true;
    const olderQuery = query(
      ref(db, `${ROOM_ID}/messages`),
      orderByKey(),
      endBefore(oldestKey),
      limitToLast(LOAD_MORE)
    );
    try {
      const snap = await get(olderQuery);
      if (!snap.exists()) { noMoreOldMessages = true; isLoadingMore = false; return; }
      const entries = [];
      snap.forEach(child => entries.push({ key: child.key, val: child.val() }));
      if (entries.length === 0) { noMoreOldMessages = true; isLoadingMore = false; return; }
      if (entries.length < LOAD_MORE) noMoreOldMessages = true;

      // 현재 DOM 가장 아래(가장 오래된) 메시지의 날짜로 lastRenderedDateStr 동기화
      const currentOldestEl = container.querySelector(`.msg-wrap[data-key="${oldestKey}"]`);
      if (currentOldestEl) {
        const tsEl = currentOldestEl.querySelector('.msg-time[data-ts]');
        if (tsEl) lastRenderedDateStr = getDateStr(parseInt(tsEl.dataset.ts));
      }

      // 오래된 순(entries[0]이 가장 오래됨)으로 prepend
      for (const { key, val: msg } of entries) {
        if (seenKeys.has(key)) continue;
        seenKeys.add(key);
        renderMessage(msg, key);
      }
      if (entries.length > 0) oldestKey = entries[0].key;
    } catch (e) { console.warn('[loadMore]', e); }
    isLoadingMore = false;
  }

  // column-reverse에서 상단 도달 감지:
  // scrollHeight - clientHeight - |scrollTop| 가 0에 가까워지면 위쪽 끝(오래된 메시지 방향)
  container.addEventListener('scroll', () => {
    const distanceFromTop = container.scrollHeight + container.scrollTop - container.clientHeight;
    if (distanceFromTop < 120) loadMoreMessages();
  }, { passive: true });

  onChildChanged(msgsQuery, snap => {
    const key = snap.key;
    const msg = snap.val();
    const el = container.querySelector(`[data-key="${key}"]`);
    if (!el || !msg.translation || !translateEnabled) return;

    let trEl = el.querySelector('.msg-translation');
    if (!trEl) {
      trEl = document.createElement('div');
      trEl.className = 'msg-translation';
      const isMe = msg.uid === me.name;
      if (isMe) trEl.style.cssText = 'border-left:none;border-right:2px solid var(--accent2);padding-left:0;padding-right:8px;text-align:right';
      const timeEl = el.querySelector('.msg-time');
      if (timeEl) el.insertBefore(trEl, timeEl);
      else el.appendChild(trEl);
    }
    trEl.textContent = msg.translation;
  });

  onValue(ref(db, `${ROOM_ID}/lastRead/${partner.name}`), snap => {
    partnerLastRead = snap.val() || 0;
    document.querySelectorAll('.read-check[data-ts]').forEach(el => {
      if (parseInt(el.dataset.ts) <= partnerLastRead) {
        el.className = 'read-check read'; el.innerHTML = CHECK_DOUBLE;
      }
    });
  });

  onValue(ref(db, `${ROOM_ID}/media`), snap => updateAlbum(snap.val()));
  listenSignaling();
  listenArchive();

  const avatarEl = document.getElementById('myAvatarDisplay');
  if (me.photoURL) {
    const myImg = document.createElement('img');
    myImg.src = sanitize(me.photoURL);
    myImg.style.cssText = 'width:100%;height:100%;object-fit:cover';
    avatarEl.innerHTML = ''; avatarEl.appendChild(myImg);
  } else { avatarEl.textContent = me.emoji; }

  document.getElementById('myNameDisplay').textContent  = me.name;
  document.getElementById('myEmailDisplay').textContent = me.email;
  document.getElementById('langSelect').value           = myLang;
  document.getElementById('translateToggle').checked    = translateEnabled;

  enterTime = Date.now();
  loadTheme();
  initNotif();
  showScreen('mainScreen');
}

async function translate(text, src, tgt) {
  try {
    const url  = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${src}&tl=${tgt}&dt=t&q=${encodeURIComponent(text)}`;
    const res  = await fetch(url);
    if (res.ok) {
      const data       = await res.json();
      const translated = data?.[0]?.map(x => x?.[0]).filter(Boolean).join('');
      if (translated) return translated;
    }
  } catch {}
  try {
    const res  = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|${tgt}`);
    const data = await res.json();
    if (data?.responseStatus === 200 && data?.responseData?.translatedText) return data.responseData.translatedText;
  } catch {}
  return null;
}

let _resizeRaf = null;

  if (_resizeRaf) return;
  _resizeRaf = requestAnimationFrame(() => {
    _resizeRaf = null;
    el.style.height = 'auto';

function mediaLabel(msg) {
  if (!msg) return '';
  if (msg.type === 'image') return '📷 사진';
  if (msg.type === 'video') return '🎥 영상';
  if (msg.type === 'album') {
    const n = Array.isArray(msg.items) ? msg.items.length : (msg.count || 0);
    return n ? `📷 사진 ${n}장` : '📷 사진';
  }
  return '';
}

// ── 날짜 구분선 ──
// column-reverse + prepend 환경:
//   - 메시지는 최신이 위(DOM 상단), 오래된 것이 아래(DOM 하단)로 쌓임
//   - prepend할 때마다 "현재 렌더 중인 메시지"와 "직전에 렌더된 메시지(DOM상 nextSibling)"의
//     날짜가 달라지는 순간 구분선을 wrap.after()로 삽입 (시각적으로 오래된 메시지 위에 표시)
// lastRenderedDateStr: 가장 최근에 prepend된 메시지의 날짜를 추적
// 초기 로드(오래된→최신 순으로 onChildAdded 호출) 시에는 매 호출마다 날짜가 바뀔 수 있으므로
// 배치가 끝난 뒤의 날짜 문자열을 저장해두고, 다음 prepend 시 비교한다.
let lastRenderedDateStr = '';
function insertDateSep(container, wrap, ts) {
  const dateStr = getDateStr(ts);
  if (dateStr !== lastRenderedDateStr) {
    // 날짜가 바뀌었다 → 구분선을 현재 wrap 바로 뒤(시각상 아래, 즉 이전 날짜 쪽)에 삽입
    const sep = document.createElement('div');
    sep.className = 'date-sep';
    sep.textContent = dateStr;
    wrap.after(sep);
    lastRenderedDateStr = dateStr;
  }
}
function resetDateSep() { lastRenderedDateStr = ''; }

function renderMessage(msg, key) {
  const container = document.getElementById('chatMessages');
  if (msg.type === 'system') {
    const d = document.createElement('div'); d.className = 'system-msg'; d.textContent = msg.text; container.prepend(d); return;
  }
  const isMe = msg.uid === me.name;
  const wrap = document.createElement('div'); wrap.className = `msg-wrap ${isMe ? 'me' : 'them'}`;
  if (key) wrap.dataset.key = key;

  if (msg.type === 'text') {
    let pressTimer;
    wrap.addEventListener('touchstart', () => {
      pressTimer = setTimeout(() => showCtxMenu(msg, wrap), 500);
    }, { passive: true });
    wrap.addEventListener('touchend',  () => clearTimeout(pressTimer), { passive: true });
    wrap.addEventListener('touchmove', () => clearTimeout(pressTimer), { passive: true });
    wrap.addEventListener('dblclick',  () => setReply(msg));
  }

  if (!isMe) {
    const s = document.createElement('div'); s.className = 'msg-sender';
    if (msg.photoURL) {
      const img = document.createElement('img');
      img.src = sanitize(msg.photoURL || '');
      img.style.cssText = 'width:18px;height:18px;border-radius:50%;object-fit:cover;margin-right:4px;vertical-align:middle';
      s.appendChild(img);
      s.appendChild(document.createTextNode(' ' + sanitize(msg.name || '')));
    } else { s.textContent = msg.name; }
    wrap.appendChild(s);
  }

  if (msg.replyTo) {
    const quote = document.createElement('div');
    quote.className = 'msg-quote';
    quote.textContent = '↩ ' + (msg.replyTo.text || mediaLabel(msg.replyTo));
    wrap.appendChild(quote);
  }

  const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
  if (msg.type === 'text') {
    const escapedText = msg.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    bubble.innerHTML = escapedText
      .replace(urlRegex, (url) => `<a href="${url}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" style="color:var(--accent2); text-decoration:underline; word-break:break-all;">${url}</a>`)
      .replace(/\n/g, '<br>');
  } else if (msg.type === 'image') {
    const d = document.createElement('div'); d.className = 'msg-media';
    const img = document.createElement('img'); img.src = msg.url; img.loading = 'lazy';
    img.onclick = () => openLightbox('image', msg.url); d.appendChild(img); bubble.appendChild(d);
  } else if (msg.type === 'video') {
    const d = document.createElement('div'); d.className = 'msg-media';
    const v = document.createElement('video'); v.src = msg.url; v.controls = true; v.playsinline = true;
    d.appendChild(v); bubble.appendChild(d);
  } else if (msg.type === 'album') {
    const items = Array.isArray(msg.items) ? msg.items : [];
    const group = document.createElement('div'); group.className = 'msg-media-group';
    items.forEach((item, idx) => {
      const cell = document.createElement('div'); cell.className = 'msg-media-group-item';
      if (item.type === 'video') {
        const v = document.createElement('video'); v.src = item.url; v.preload = 'metadata'; v.muted = true; v.playsinline = true;
        cell.appendChild(v);
        const ic = document.createElement('div'); ic.className = 'play-icon';
        ic.innerHTML = `<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
        cell.appendChild(ic);
      } else {
        const img = document.createElement('img'); img.src = item.url; img.loading = 'lazy';
        cell.appendChild(img);
      }
      if (items.length > 1) {
        const badge = document.createElement('div'); badge.className = 'msg-media-group-count';
        badge.textContent = `${idx + 1}/${items.length}`;
        cell.appendChild(badge);
      }
      cell.onclick = () => openLightbox(item.type, item.url, items, idx);
      group.appendChild(cell);
    });
    bubble.appendChild(group);
  }
  wrap.appendChild(bubble);

  if (msg.translation && translateEnabled) {
    const tr = document.createElement('div'); tr.className = 'msg-translation'; tr.textContent = msg.translation; wrap.appendChild(tr);
  }

  const t = document.createElement('div'); t.className = 'msg-time'; t.dataset.ts = msg.ts;
  t.appendChild(document.createTextNode(fmt(msg.ts)));
  if (isMe) {
    const check = document.createElement('span');
    check.dataset.ts = msg.ts;
    check.className = msg.ts <= partnerLastRead ? 'read-check read' : 'read-check unread';
    check.innerHTML  = msg.ts <= partnerLastRead ? CHECK_DOUBLE : CHECK_SINGLE;
    t.appendChild(check);
  }
  wrap.appendChild(t);
  container.prepend(wrap);

  // 날짜 구분선 삽입 (중복 방지 로직 포함)
  insertDateSep(container, wrap, msg.ts);
}

const fmt = ts => { const d = new Date(ts); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };

function getDateStr(ts) {
  const d = new Date(ts);
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
}

function uploadOneFile(file, progressPrefix) {
  return new Promise((resolve, reject) => {
    const isVideo = file.type.startsWith('video/');
    const safeName = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}_${file.name}`;
    const task = uploadBytesResumable(sRef(storage, `${ROOM_ID}/${safeName}`), file);
    task.on('state_changed',
      s => showToast(`${progressPrefix}업로드 ${Math.round(s.bytesTransferred / s.totalBytes * 100)}%`),
      err => reject(err),
      async () => {
        try { const url = await getDownloadURL(task.snapshot.ref); resolve({ url, type: isVideo ? 'video' : 'image' }); }
        catch (err) { reject(err); }
      }
    );
  });
}

async function sendSingleMedia(file) {
  showToast('업로드 중...');
  try {
    const { url, type } = await uploadOneFile(file, '');
    const ts = Date.now();
    push(ref(db, `${ROOM_ID}/messages`), { uid: me.name, name: me.name, photoURL: me.photoURL || '', type, url, ts });
    push(ref(db, `${ROOM_ID}/media`),    { uid: me.name, type, url, ts });
    showToast('공유 완료!');
  } catch (err) { showToast('실패: ' + err.message); }
}

async function sendMediaGroup(files) {
  const total = files.length;
  const items = [];
  const baseTs = Date.now();
  try {
    for (let i = 0; i < total; i++) {
      const { url, type } = await uploadOneFile(files[i], `(${i + 1}/${total}) `);
      items.push({ url, type });
      push(ref(db, `${ROOM_ID}/media`), { uid: me.name, type, url, ts: baseTs + i });
    }
    push(ref(db, `${ROOM_ID}/messages`), {
      uid: me.name, name: me.name, photoURL: me.photoURL || '',
      type: 'album', items, ts: baseTs + total
    });
    showToast(`사진 ${total}장 공유 완료!`);
  } catch (err) { showToast('실패: ' + err.message); }
}

window.sendMedia = async function(e) {
  const files = Array.from(e.target.files || []);
  e.target.value = '';
  if (files.length === 0) return;
  if (files.length === 1) await sendSingleMedia(files[0]);
  else await sendMediaGroup(files);
};

function updateAlbum(media) {
  const grid = document.getElementById('albumGrid'); grid.innerHTML = '';
  if (!media) { grid.innerHTML = '<div class="album-empty" style="grid-column:1/-1;height:300px">아직 공유된 미디어가 없어요</div>'; return; }
  Object.values(media).sort((a,b)=>b.ts-a.ts).forEach(item => {
    const div = document.createElement('div'); div.className = 'album-item';
    if (item.type==='video') {
      const v=document.createElement('video'); v.src=item.url; v.preload='metadata'; div.appendChild(v);
      const ic=document.createElement('div'); ic.className='play-icon'; ic.innerHTML=`<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`; div.appendChild(ic);
      div.onclick=()=>openLightbox('video',item.url);
    } else {
      const img=document.createElement('img'); img.src=item.url; img.loading='lazy'; div.appendChild(img);
      div.onclick=()=>openLightbox('image',item.url);
    }
    grid.appendChild(div);
  });
}

let lightboxGallery = null;

function renderLightboxItem(type, url) {
  const c = document.getElementById('lightboxContent'); c.innerHTML = '';
  if (type === 'image') { const i = document.createElement('img'); i.src = url; c.appendChild(i); }
  else { const v = document.createElement('video'); v.src = url; v.controls = true; v.playsinline = true; v.autoplay = true; c.appendChild(v); }
}

function updateLightboxNav() {
  const prevBtn = document.getElementById('lbPrev');
  const nextBtn = document.getElementById('lbNext');
  const counter = document.getElementById('lbCounter');
  if (lightboxGallery && lightboxGallery.items.length > 1) {
    prevBtn.style.display = 'flex'; nextBtn.style.display = 'flex';
    counter.style.display = 'block';
    counter.textContent = `${lightboxGallery.index + 1} / ${lightboxGallery.items.length}`;
  } else {
    prevBtn.style.display = 'none'; nextBtn.style.display = 'none';
    counter.style.display = 'none';
  }
}

window.lightboxNav = dir => {
  if (!lightboxGallery) return;
  const n = lightboxGallery.items.length;
  lightboxGallery.index = (lightboxGallery.index + dir + n) % n;
  const item = lightboxGallery.items[lightboxGallery.index];
  renderLightboxItem(item.type, item.url);
  updateLightboxNav();
};

window.openLightbox = (type, url, items, index) => {
  lightboxGallery = (Array.isArray(items) && items.length > 1) ? { items, index: index || 0 } : null;
  renderLightboxItem(type, url);
  updateLightboxNav();
  const lb = document.getElementById('lightbox');
  lb.classList.add('open');
  lb.onclick = e => { if (e.target === lb) closeLightbox(); };
};
window.closeLightbox = () => {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxContent').innerHTML = '';
  lightboxGallery = null;
};
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') { closeLightbox(); return; }
  if (lightboxGallery) {
    if (e.key === 'ArrowLeft') lightboxNav(-1);
    else if (e.key === 'ArrowRight') lightboxNav(1);
  }
});

  });

function listenSignaling() {
  onValue(ref(db, `${ROOM_ID}/signal/${me.name}`), snap => {
    const sig = snap.val();
    if (!sig) return;
    if (sig.ts && Date.now() - sig.ts > 30000) { set(ref(db, `${ROOM_ID}/signal/${me.name}`), null); return; }
    if (sig.type === 'incoming') { showIncomingCall(sig); window._incomingJitsiUrl = sig.jitsiUrl; }

function showIncomingCall(sig) {
  const av = document.getElementById('incomingAvatar');
  av.innerHTML = '';
  if (sig.photoURL) {
    const incImg = document.createElement('img');
    incImg.src = sanitize(sig.photoURL);
    incImg.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%';

  document.getElementById('incomingName').textContent = sig.name||'상대방';
  document.getElementById('incomingType').textContent = sig.callType==='video'?'📹 영상 통화':'📞 음성 통화';
  document.getElementById('incomingCall').classList.add('show');
  if (navigator.vibrate) navigator.vibrate([300,200,300]);
}
window.acceptCall = async () => {
  document.getElementById('incomingCall').classList.remove('show');
  await set(ref(db, `${ROOM_ID}/signal/${me.name}`), null);

window.rejectCall = async () => {
  document.getElementById('incomingCall').classList.remove('show');
  window._incomingJitsiUrl = null;
  await set(ref(db, `${ROOM_ID}/signal/${me.name}`), null);

let searchMatches = [];

window.toggleSearch = function() {
  const bar = document.getElementById('searchBar');
  const isOpen = bar.classList.toggle('show');
  if (isOpen) document.getElementById('searchInput').focus();
  else clearSearch();
};
window.doSearch = function() {
  clearSearchHighlights();
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) { document.getElementById('searchCount').textContent = ''; searchMatches = []; return; }
  const bubbles = document.querySelectorAll('#chatMessages .msg-bubble');
  searchMatches = [];
  bubbles.forEach(b => { if (b.textContent.toLowerCase().includes(q)) { b.classList.add('msg-highlight'); searchMatches.push(b); } });
  searchMatches.reverse();
  searchIdx = searchMatches.length > 0 ? 0 : -1;
  document.getElementById('searchCount').textContent = searchMatches.length > 0 ? `${searchIdx+1}/${searchMatches.length}` : '0건';
  if (searchMatches.length > 0) searchMatches[0].scrollIntoView({ block: 'center' });
};
window.searchNext = function() {
  if (searchMatches.length === 0) return;
  searchIdx = (searchIdx + 1) % searchMatches.length;
  searchMatches[searchIdx].scrollIntoView({ block: 'center' });
  document.getElementById('searchCount').textContent = `${searchIdx+1}/${searchMatches.length}`;
};
window.searchPrev = function() {
  if (searchMatches.length === 0) return;
  searchIdx = (searchIdx - 1 + searchMatches.length) % searchMatches.length;
  searchMatches[searchIdx].scrollIntoView({ block: 'center' });
  document.getElementById('searchCount').textContent = `${searchIdx+1}/${searchMatches.length}`;
};
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchCount').textContent = '';
  clearSearchHighlights();
  searchMatches = []; searchIdx = -1;
}
function clearSearchHighlights() { document.querySelectorAll('.msg-highlight').forEach(el => el.classList.remove('msg-highlight')); }

// ── 컨텍스트 메뉴 ──
let ctxTargetMsg = null;
const ctxMenu = document.getElementById('ctxMenu');

function showCtxMenu(msg, wrap) {
  ctxTargetMsg = msg;
  const rect = wrap.getBoundingClientRect();
  const menuH = 100;
  let top = rect.bottom + 6;
  if (top + menuH > window.innerHeight - 20) top = rect.top - menuH - 6;
  ctxMenu.style.top = `${top}px`;
  const isMe = msg.uid === me.name;
  if (isMe) { ctxMenu.style.right = `${window.innerWidth - rect.right}px`; ctxMenu.style.left = 'auto'; }
  else { ctxMenu.style.left = `${rect.left}px`; ctxMenu.style.right = 'auto'; }
  ctxMenu.classList.add('show');
  if (navigator.vibrate) navigator.vibrate(30);
}

function hideCtxMenu() { ctxMenu.classList.remove('show'); ctxTargetMsg = null; }

document.getElementById('ctxReply').addEventListener('click', () => { if (ctxTargetMsg) setReply(ctxTargetMsg); hideCtxMenu(); });
document.getElementById('ctxArchive').addEventListener('click', () => { if (ctxTargetMsg) saveToArchive(ctxTargetMsg); hideCtxMenu(); });

document.addEventListener('touchstart', e => {
  if (ctxMenu.classList.contains('show') && !ctxMenu.contains(e.target)) hideCtxMenu();
}, { passive: true });
document.addEventListener('click', e => {
  if (ctxMenu.classList.contains('show') && !ctxMenu.contains(e.target)) hideCtxMenu();
});

// ── 보관함 ──
function archivePath() { return `${ROOM_ID}/archive/${me.name}`; }

async function saveToArchive(msg) {
  await push(ref(db, archivePath()), {
    text: msg.text || null, type: msg.type || 'text',
    url: msg.url || null, name: msg.name || '',
    uid: msg.uid || '', ts: msg.ts || Date.now(), savedAt: Date.now()
  });
  showToast('보관함에 저장됐어요 🔖');
}

async function deleteFromArchive(archiveKey) {
  await set(ref(db, `${archivePath()}/${archiveKey}`), null);
}

function renderArchiveList(data) {
  const list = document.getElementById('archiveList');
  list.innerHTML = '';
  if (!data) { list.innerHTML = '<div class="archive-empty">보관된 메시지가 없어요</div>'; return; }
  const items = Object.entries(data).sort((a,b) => b[1].savedAt - a[1].savedAt);
  items.forEach(([key, item]) => {
    const div = document.createElement('div'); div.className = 'archive-item';
    const meta = document.createElement('div'); meta.className = 'archive-item-meta';
    const senderSpan = document.createElement('span'); senderSpan.className = 'archive-item-sender'; senderSpan.textContent = sanitize(item.name) || '알 수 없음';
    const timeSpan = document.createElement('span'); timeSpan.textContent = fmtFull(item.ts);
    meta.appendChild(senderSpan); meta.appendChild(timeSpan); div.appendChild(meta);
    if (item.type === 'text' && item.text) {
      const p = document.createElement('div'); p.className = 'archive-item-text'; p.textContent = item.text; div.appendChild(p);
    } else if ((item.type === 'image' || item.type === 'video') && item.url) {
      const wrap = document.createElement('div'); wrap.className = 'archive-item-media';
      if (item.type === 'image') { const img = document.createElement('img'); img.src = item.url; img.loading = 'lazy'; img.onclick = () => openLightbox('image', item.url); wrap.appendChild(img); }
      else { const v = document.createElement('video'); v.src = item.url; v.controls = true; v.playsinline = true; wrap.appendChild(v); }
      div.appendChild(wrap);
    }
    const delBtn = document.createElement('button'); delBtn.className = 'archive-del'; delBtn.textContent = '✕'; delBtn.onclick = () => deleteFromArchive(key);
    div.appendChild(delBtn);
    list.appendChild(div);
  });
}

function fmtFull(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function listenArchive() { onValue(ref(db, archivePath()), snap => renderArchiveList(snap.val())); }

window.showToast = msg => {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(window._tt); window._tt = setTimeout(() => t.classList.remove('show'), 2500);
};
</script>
</body>
</html>
