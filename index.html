<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-title" content="meMo">
<title>meMo</title>
<style>
  :root {
    --bg: #0d0d0f; --surface: #18181c; --surface2: #222228;
    --border: rgba(255,255,255,0.08); --accent: #c8a97e; --accent2: #8fa8c8;
    --text: #f0ede8; --text2: #9a9590; --danger: #c87e7e;
    --bubble-me: #2a2118; --bubble-them: #1a1e24;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  /* ── 테마 ── */
  .theme-rose {
    --bg: #fff5f7; --surface: #ffffff; --surface2: #fce8ed;
    --border: rgba(220,100,120,0.12); --accent: #d4607a; --accent2: #b07090;
    --text: #2a1018; --text2: #906070; --danger: #c0392b;
    --bubble-me: #fde8ee; --bubble-them: #f8f0f2;
  }
  .theme-skyblue {
    --bg: #f0f6ff; --surface: #ffffff; --surface2: #e4eefa;
    --border: rgba(80,130,220,0.12); --accent: #4a7fd4; --accent2: #6090b8;
    --text: #101828; --text2: #607090; --danger: #c0392b;
    --bubble-me: #ddeeff; --bubble-them: #eef4ff;
  }
  .theme-purple {
    --bg: #f8f4ff; --surface: #ffffff; --surface2: #ede4ff;
    --border: rgba(140,90,220,0.12); --accent: #8a5cd4; --accent2: #a070c8;
    --text: #180e28; --text2: #806090; --danger: #c0392b;
    --bubble-me: #ecdeff; --bubble-them: #f4f0ff;
  }
  .theme-cream {
    --bg: #fdf8f0; --surface: #ffffff; --surface2: #f5ede0;
    --border: rgba(180,140,80,0.12); --accent: #b8904a; --accent2: #8a7060;
    --text: #1e160a; --text2: #806840; --danger: #c0392b;
    --bubble-me: #fdf0d8; --bubble-them: #f8f0e8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, 'Noto Sans KR', sans-serif; }
  
  /* ── 기본 구조 ── */
  .screen { 
    position: fixed; 
    inset: 0; 
    display: flex; 
    flex-direction: column; 
    background: var(--bg);
  }
  .screen.hidden { display: none; }

  /* ── 모바일 기준 레이아웃 기본값 ── */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 52px 16px 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px 16px; display: flex; flex-direction: column-reverse; gap: 8px; }
  .chat-messages::-webkit-scrollbar { display: none; }
  .chat-input-wrap { display: flex; align-items: flex-end; gap: 8px; padding: 10px 16px; padding-bottom: calc(10px + var(--safe-bottom)); background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .search-bar { display: none; gap: 8px; align-items: center; padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .reply-bar { display: none; align-items: center; gap: 8px; background: var(--surface2); border-left: 3px solid var(--accent); padding: 8px 14px; font-size: 0.8rem; color: var(--text2); flex-shrink: 0; }
  .album-grid { flex: 1; overflow-y: auto; padding: 2px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }

  /* ── [반응형 수정] 데스크탑 / 태블릿 대화면 환경을 위한 와이드 레이아웃 자동 변환 ── */
  @media (min-width: 768px) {
    /* 화면이 넓어지면 슬랙이나 PC용 메신저처럼 본문 영역 주위에 시원하게 여백(12%)을 부여 */
    .topbar { padding: 24px 12% 16px; }
    .chat-messages { padding: 24px 12%; }
    .chat-input-wrap { padding: 16px 12% calc(16px + var(--safe-bottom)); }
    .search-bar { padding: 12px 12%; }
    .reply-bar { padding: 12px 14px; margin: 0 12%; border-radius: 8px 8px 0 0; }
    
    /* 모니터에서 글줄이 너무 길어져 가독성이 해쳐지는 것을 막기 위해 말풍선 너비 제한 */
    .msg-wrap { max-width: 62%; }
    
    /* 앨범 공간을 데스크탑 격자 구조(5열)로 변경하여 더 많은 사진을 한눈에 표시 */
    .album-grid { grid-template-columns: repeat(5, 1fr); padding: 24px 12%; gap: 12px; }
    
    /* 설정 화면의 요소들이 무한정 늘어지지 않도록 최적 너비로 고정 및 중앙 정렬 */
    .profile-header, .profile-section, .danger-btn, #callPane { 
      max-width: 550px; 
      width: 100%; 
      margin-left: auto; 
      margin-right: auto; 
    }
  }

  /* ── LOGIN ── */
  #loginScreen { align-items: center; justify-content: center; gap: 2.5rem; }
  .login-logo { font-size: 3.4rem; font-weight: 200; color: var(--accent); letter-spacing: -2px; }
  .login-logo span { color: var(--accent2); }
  .login-sub { color: var(--text2); font-size: 0.8rem; letter-spacing: 0.15em; }
  .google-btn {
    display: flex; align-items: center; gap: 12px;
    background: white; color: #1f1f1f; border: none; border-radius: 14px;
    padding: 14px 28px; font-size: 1rem; font-weight: 500; cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3); transition: opacity 0.2s, transform 0.1s;
  }
  .google
