<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>meMo</title>
<style>
  :root {
    --bg: #0d0d0f; --surface: #18181c; --surface2: #222228;
    --border: rgba(255,255,255,0.08); --accent: #c8a97e; --accent2: #8fa8c8;
    --text: #f0ede8; --text2: #9a9590; --danger: #c87e7e;
    --bubble-me: #2a2118; --bubble-them: #1a1e24;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, 'Noto Sans KR', sans-serif; }
  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; }
  .screen.hidden { display: none; }

  /* ── LOGIN ── */
  #loginScreen { background: var(--bg); align-items: center; justify-content: center; gap: 2.5rem; }
  .login-logo { font-size: 3.4rem; font-weight: 200; color: var(--accent); letter-spacing: -2px; }
  .login-logo span { color: var(--accent2); }
  .login-sub { color: var(--text2); font-size: 0.8rem; letter-spacing: 0.15em; }
  .google-btn {
    display: flex; align-items: center; gap: 12px;
    background: white; color: #1f1f1f; border: none; border-radius: 14px;
    padding: 14px 28px; font-size: 1rem; font-weight: 500; cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3); transition: opacity 0.2s, transform 0.1s;
  }
  .google-btn:active { opacity: 0.85; transform: scale(0.97); }
  .google-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
  .login-error { color: var(--danger); font-size: 0.82rem; text-align: center; max-width: 280px; line-height: 1.5; min-height: 1.2em; }

  /* ── LOADING ── */
  #loadingScreen { background: var(--bg); align-items: center; justify-content: center; gap: 1rem; }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text2); font-size: 0.85rem; }

  /* ── TOPBAR ── */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 52px 20px 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .topbar-title { font-size: 1rem; font-weight: 500; }
  .topbar-actions { display: flex; gap: 12px; }
  .icon-btn { background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px; display: flex; align-items: center; border-radius: 8px; transition: color 0.2s; }
  .icon-btn:active { color: var(--accent); }
  .icon-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; }

  /* ── MAIN ── */
  #mainScreen { background: var(--bg); }
  .tab-content { flex: 1; overflow: hidden; position: relative; }
  .tab-pane { position: absolute; inset: 0; display: flex; flex-direction: column; overflow: hidden; }
  .tab-pane.hidden { display: none; }
  .tab-bar { display: flex; background: var(--surface); border-top: 1px solid var(--border); padding-bottom: var(--safe-bottom); flex-shrink: 0; }
  .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 0 8px; background: none; border: none; color: var(--text2); font-size: 0.65rem; cursor: pointer; transition: color 0.2s; }
  .tab-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; }
  .tab-btn.active { color: var(--accent); }

  /* ── CHAT ── */
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
  .chat-messages::-webkit-scrollbar { display: none; }
  .msg-wrap { display: flex; flex-direction: column; max-width: 78%; }
  .msg-wrap.me { align-self: flex-end; align-items: flex-end; }
  .msg-wrap.them { align-self: flex-start; align-items: flex-start; }
  .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 0.95rem; line-height: 1.5; word-break: break-word; }
  .me .msg-bubble { background: var(--bubble-me); border-bottom-right-radius: 4px; border: 1px solid rgba(200,169,126,0.15); }
  .them .msg-bubble { background: var(--bubble-them); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
  .msg-translation { font-size: 0.78rem; color: var(--text2); margin-top: 4px; padding-left: 8px; border-left: 2px solid var(--accent); }
  .me .msg-translation { border-left: none; border-right: 2px solid var(--accent2); padding-left: 0; padding-right: 8px; text-align: right; }
  .msg-time { font-size: 0.68rem; color: var(--text2); margin-top: 3px; padding: 0 4px; }
  .msg-sender { font-size: 0.72rem; color: var(--text2); margin-bottom: 3px; padding: 0 4px; }
  .msg-media { max-width: 220px; border-radius: 12px; overflow: hidden; }
  .msg-media img { width: 100%; display: block; cursor: pointer; }
  .msg-media video { width: 100%; display: block; border-radius: 8px; }
  .system-msg { text-align: center; color: var(--text2); font-size: 0.75rem; padding: 4px 0; }
  .chat-input-wrap { display: flex; align-items: flex-end; gap: 8px; padding: 10px 12px; padding-bottom: calc(10px + var(--safe-bottom)); background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 22px; color: var(--text); padding: 10px 16px; font-size: 0.95rem; outline: none; resize: none; max-height: 120px; min-height: 42px; line-height: 1.4; font-family: inherit; transition: border-color 0.2s; }
  .chat-input:focus { border-color: var(--accent); }
  .chat-send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: opacity 0.2s, transform 0.1s; }
  .chat-send-btn:active { opacity: 0.7; transform: scale(0.93); }
  .chat-send-btn svg { width: 18px; height: 18px; stroke: #0d0d0f; fill: none; stroke-width: 2; }
  .partner-status { font-size: 0.75rem; color: var(--text2); }
  .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #4a7a4a; display: inline-block; margin-right: 6px; }

  /* ── ALBUM ── */
  .album-grid { flex: 1; overflow-y: auto; padding: 2px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
  .album-item { aspect-ratio: 1; overflow: hidden; position: relative; cursor: pointer; background: var(--surface); }
  .album-item img, .album-item video { width: 100%; height: 100%; object-fit: cover; }
  .album-item .play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }
  .album-item .play-icon svg { width: 32px; height: 32px; fill: rgba(255,255,255,0.9); }
  .album-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 0.9rem; }

  /* ── LIGHTBOX ── */
  #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  #lightbox.open { opacity: 1; pointer-events: all; }
  #lightbox img, #lightbox video { max-width: 100%; max-height: 100%; object-fit: contain; }
  #lightbox .close-lb { position: absolute; top: 52px; right: 20px; background: none; border: none; color: white; font-size: 2rem; cursor: pointer; z-index: 101; padding: 8px; }

  /* ── CALL ── */
  #callPane { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem; padding: 2rem; }
  .call-avatar { width: 100px; height: 100px; border-radius: 50%; background: var(--surface2); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; overflow: hidden; }
  .call-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .call-name { font-size: 1.3rem; font-weight: 300; color: var(--accent); }
  .call-status { color: var(--text2); font-size: 0.85rem; }
  .call-timer { color: var(--text); font-size: 1.1rem; font-variant-numeric: tabular-nums; }
  .call-controls { display: flex; gap: 20px; margin-top: 1rem; }
  .call-btn { width: 64px; height: 64px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s, transform 0.1s; }
  .call-btn:active { opacity: 0.7; transform: scale(0.93); }
  .call-btn svg { width: 26px; height: 26px; stroke: white; fill: none; stroke-width: 1.8; }
  .call-btn.end { background: var(--danger); }
  .call-btn.mute { background: var(--surface2); border: 1px solid var(--border); }
  .call-btn.video-toggle { background: var(--surface2); border: 1px solid var(--border); }
  .call-btn.start-audio { background: #4a7a4a; }
  .call-btn.start-video { background: var(--accent2); }
  .call-video-wrap { width: 100%; max-width: 360px; position: relative; border-radius: 16px; overflow: hidden; background: #000; aspect-ratio: 9/16; max-height: 55vh; }
  .call-video-wrap video { width: 100%; height: 100%; object-fit: cover; }
  #localVid { position: absolute; width: 30%; aspect-ratio: 9/16; bottom: 12px; right: 12px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); z-index: 2; }
  #remoteVid { width: 100%; height: 100%; }

  /* ── INCOMING CALL ── */
  #incomingCall { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; }
  #incomingCall.show { display: flex; }
  .incoming-name { font-size: 1.8rem; font-weight: 300; color: var(--accent); }
  .incoming-type { font-size: 0.85rem; color: var(--text2); }
  .incoming-btns { display: flex; gap: 40px; margin-top: 1rem; }
  .inc-btn { width: 72px; height: 72px; border-radius: 50%; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
  .inc-btn svg { width: 28px; height: 28px; stroke: white; fill: none; stroke-width: 1.8; }
  .inc-btn span { font-size: 0.7rem; color: white; }
  .inc-btn.accept { background: #4a7a4a; }
  .inc-btn.reject { background: var(--danger); }

  /* ── PROFILE ── */
  .profile-header { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 20px 0; }
  .profile-avatar-lg { width: 88px; height: 88px; border-radius: 50%; background: var(--surface2); border: 2px solid var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
  .profile-avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
  .profile-section { background: var(--surface); border-radius: 16px; overflow: hidden; }
  .profile-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); gap: 12px; }
  .profile-row:last-child { border-bottom: none; }
  .profile-row-label { font-size: 0.9rem; color: var(--text2); }
  .lang-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 6px 10px; font-size: 0.85rem; outline: none; cursor: pointer; }
  .danger-btn { background: none; border: 1px solid var(--danger); border-radius: 12px; color: var(--danger); padding: 12px; font-size: 0.9rem; cursor: pointer; width: 100%; }
  .danger-btn:active { background: rgba(200,126,126,0.1); }
  .toggle-sw { position: relative; width: 44px; height: 24px; }
  .toggle-sw input { opacity: 0; width: 0; height: 0; }
  .toggle-sw .slider { position: absolute; inset: 0; background: var(--surface2); border-radius: 24px; border: 1px solid var(--border); cursor: pointer; transition: background 0.2s; }
  .toggle-sw .slider::before { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: var(--text2); top: 2px; left: 2px; transition: transform 0.2s, background 0.2s; }
  .toggle-sw input:checked + .slider { background: rgba(200,169,126,0.2); border-color: var(--accent); }
  .toggle-sw input:checked + .slider::before { transform: translateX(20px); background: var(--accent); }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: calc(80px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(10px); background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 20px; font-size: 0.85rem; color: var(--text); z-index: 300; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- 로딩 -->
<div id="loadingScreen" class="screen">
  <div class="spinner"></div>
  <div class="loading-text">연결 중...</div>
</div>

<!-- 로그인 -->
<div id="loginScreen" class="screen hidden">
  <div class="login-logo">me<span>M</span>o</div>
  <div class="login-sub">only for two</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Google로 로그인
  </button>
  <div class="login-error" id="loginError"></div>
</div>

<!-- 메인 -->
<div id="mainScreen" class="screen hidden">
  <div class="tab-content">

    <!-- CHAT -->
    <div id="chatPane" class="tab-pane">
      <div class="topbar">
        <div>
          <div class="topbar-title">💬 채팅</div>
          <div class="partner-status" id="partnerStatus">상대방 대기 중...</div>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" onclick="startCall('audio')">
            <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 11.7 19.79 19.79 0 0115.9 3.07 2 2 0 0122 16.92z"/></svg>
          </button>
          <button class="icon-btn" onclick="startCall('video')">
            <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          </button>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-wrap">
        <button class="icon-btn" onclick="document.getElementById('mediaInput').click()">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
        <textarea class="chat-input" id="msgInput" placeholder="메시지 입력..." rows="1"
          oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
        <button class="chat-send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <input type="file" id="mediaInput" accept="image/*,video/*" style="display:none" onchange="sendMedia(event)">
    </div>

    <!-- ALBUM -->
    <div id="albumPane" class="tab-pane hidden">
      <div class="topbar"><div class="topbar-title">📷 앨범</div></div>
      <div class="album-grid" id="albumGrid">
        <div class="album-empty" style="grid-column:1/-1;height:300px">아직 공유된 미디어가 없어요</div>
      </div>
    </div>

    <!-- CALL -->
    <div id="callTabPane" class="tab-pane hidden">
      <div class="topbar"><div class="topbar-title">📞 통화</div></div>
      <div id="callPane">
        <div class="call-avatar" id="callAvatar">🌸</div>
        <div class="call-name" id="callName">상대방</div>
        <div class="call-status" id="callStatus">통화 중이 아닙니다</div>
        <div class="call-timer" id="callTimer" style="display:none">00:00</div>
        <div class="call-video-wrap" id="callVideoWrap" style="display:none">
          <video id="remoteVid" autoplay playsinline></video>
          <div id="localVid"><video id="localVidEl" autoplay playsinline muted></video></div>
        </div>
        <div class="call-controls" id="callControls">
          <button class="call-btn start-audio" onclick="startCall('audio')">
            <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 11.7 19.79 19.79 0 0115.9 3.07 2 2 0 0122 16.92z"/></svg>
          </button>
          <button class="call-btn start-video" onclick="startCall('video')">
            <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          </button>
        </div>
        <div class="call-controls" id="activeCallControls" style="display:none">
          <button class="call-btn mute" id="muteBtn" onclick="toggleMute()">
            <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <button class="call-btn video-toggle" id="videoToggleBtn" onclick="toggleVideo()">
            <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
          </button>
          <button class="call-btn end" onclick="endCall()">
            <svg viewBox="0 0 24 24"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07"/><path d="M6.67 6.67A19.5 19.5 0 0 0 3 15.9a2 2 0 0 1-2-2.18v-3a2 2 0 0 1 1.72-2 12.84 12.84 0 0 0 2.81-.7 2 2 0 0 1 2.11.45l1.27 1.27"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- PROFILE -->
    <div id="profilePane" class="tab-pane hidden">
      <div class="topbar"><div class="topbar-title">⚙️ 설정</div></div>
      <div style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px">
        <div class="profile-header">
          <div class="profile-avatar-lg" id="myAvatarDisplay">🙂</div>
          <div style="font-size:1.2rem;font-weight:400" id="myNameDisplay">-</div>
          <div style="font-size:0.8rem;color:var(--text2)" id="myEmailDisplay">-</div>
        </div>
        <div class="profile-section">
          <div class="profile-row">
            <span class="profile-row-label">자동 번역 (한↔일)</span>
            <label class="toggle-sw">
              <input type="checkbox" id="translateToggle" checked onchange="saveTranslatePref()">
              <span class="slider"></span>
            </label>
          </div>
          <div class="profile-row">
            <span class="profile-row-label">내 언어</span>
            <select class="lang-select" id="langSelect" onchange="changeLang()">
              <option value="ko">🇰🇷 한국어</option>
              <option value="ja">🇯🇵 日本語</option>
            </select>
          </div>
        </div>
        <button class="danger-btn" onclick="doLogout()">로그아웃</button>
      </div>
    </div>

  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-chat" onclick="switchTab('chat')">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      채팅
    </button>
    <button class="tab-btn" id="tab-album" onclick="switchTab('album')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      앨범
    </button>
    <button class="tab-btn" id="tab-call" onclick="switchTab('call')">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 11.7 19.79 19.79 0 0115.9 3.07 2 2 0 0122 16.92z"/></svg>
      통화
    </button>
    <button class="tab-btn" id="tab-profile" onclick="switchTab('profile')">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      설정
    </button>
  </div>
</div>

<!-- INCOMING CALL -->
<div id="incomingCall">
  <div class="call-avatar" style="width:80px;height:80px;font-size:2rem" id="incomingAvatar">🌸</div>
  <div style="color:var(--text2);font-size:0.9rem">전화가 왔어요</div>
  <div class="incoming-name" id="incomingName">-</div>
  <div class="incoming-type" id="incomingType">음성 통화</div>
  <div class="incoming-btns">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <button class="inc-btn reject" onclick="rejectCall()">
        <svg viewBox="0 0 24 24"><path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7 2 2 0 011.72 2v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07"/><path d="M6.67 6.67A19.5 19.5 0 003 15.9a2 2 0 01-2-2.18v-3a2 2 0 011.72-2 12.84 12.84 0 002.81-.7 2 2 0 012.11.45l1.27 1.27"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        <span>거절</span>
      </button>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <button class="inc-btn accept" onclick="acceptCall()">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 11.7 19.79 19.79 0 0115.9 3.07 2 2 0 0122 16.92z"/></svg>
        <span>수락</span>
      </button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button class="close-lb" onclick="closeLightbox()">✕</button>
  <div id="lightboxContent"></div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp }                                    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup,
         signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut }
                                                            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getDatabase, ref, set, push, onValue,
         onDisconnect, serverTimestamp }                    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
import { getStorage, ref as sRef,
         uploadBytesResumable, getDownloadURL }             from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';

// ── Firebase 설정 ──
const firebaseConfig = {
  apiKey:            "AIzaSyBSfAOkWJtk41iCLIWkCtG91Hn9Aa44UNA",
  authDomain:        "memo-e366f.firebaseapp.com",
  databaseURL:       "https://memo-e366f-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "memo-e366f",
  storageBucket:     "memo-e366f.firebasestorage.app",
  messagingSenderId: "103854425677",
  appId:             "1:103854425677:web:67e0b818c41b42bc3c7e04"
};

// ── 허용된 Google 계정 2개 ──
const ALLOWED = {
  'fromkevinjung@gmail.com': { name: 'Kevin', emoji: '🍀', lang: 'ko', partnerEmail: 'momo.021118@gmail.com' },
  'momo.021118@gmail.com':   { name: 'Momo',  emoji: '🌸', lang: 'ja', partnerEmail: 'fromkevinjung@gmail.com' }
};
const ROOM_ID = 'memo_private_room';

const app     = initializeApp(firebaseConfig);
const auth    = getAuth(app);
const db      = getDatabase(app);
const storage = getStorage(app);

let me = null, partner = null;
let myLang = 'ko', translateEnabled = true;
let peerConnection = null, localStream = null, callType = null, callTimerInterval = null;
let isMuted = false, isVideoOff = false;

// ── 화면 전환 ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ── Google 로그인 ──
window.signInWithGoogle = async function() {
  const provider = new GoogleAuthProvider();
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  try {
    // 모바일은 redirect, 데스크탑은 popup
    if (/Mobi|Android/i.test(navigator.userAgent)) {
      await signInWithRedirect(auth, provider);
    } else {
      await signInWithPopup(auth, provider);
    }
  } catch(e) {
    errEl.textContent = '로그인 중 오류가 발생했습니다. 다시 시도해주세요.';
  }
};

// ── 인증 상태 감지 (앱 시작점) ──
// 모바일 redirect 결과 처리
getRedirectResult(auth).catch(() => {});

onAuthStateChanged(auth, async user => {
  if (!user) {
    showScreen('loginScreen');
    return;
  }

  const email = user.email;
  const profile = ALLOWED[email];

  if (!profile) {
    // 허용되지 않은 계정
    await signOut(auth);
    const errEl = document.getElementById('loginError');
    errEl.textContent = `${email} 은 접근이 허용되지 않은 계정입니다.`;
    showScreen('loginScreen');
    return;
  }

  // 계정 정보 세팅
  me = { ...profile, email, photoURL: user.photoURL };
  partner = { ...ALLOWED[profile.partnerEmail], email: profile.partnerEmail };
  myLang = localStorage.getItem(`memo_lang_${email}`) || profile.lang;
  translateEnabled = localStorage.getItem('memo_translate') !== 'false';

  enterRoom();
});

// ── 입장 ──
function enterRoom() {
  const meRef = ref(db, `${ROOM_ID}/presence/${me.name}`);
  set(meRef, { online: true, name: me.name, photoURL: me.photoURL || '', ts: serverTimestamp() });
  onDisconnect(meRef).update({ online: false });

  // 상대방 온라인 감시
  onValue(ref(db, `${ROOM_ID}/presence/${partner.name}`), snap => {
    const data = snap.val();
    const el = document.getElementById('partnerStatus');
    el.innerHTML = data?.online
      ? `<span class="online-dot"></span>${partner.name} 온라인`
      : `${partner.name} 오프라인`;
    document.getElementById('callName').textContent = partner.name;
    // 상대방 프로필 사진
    const av = document.getElementById('callAvatar');
    if (data?.photoURL) {
      av.innerHTML = `<img src="${data.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
    } else {
      av.textContent = partner.emoji;
    }
  });

  // 채팅 감시
  onValue(ref(db, `${ROOM_ID}/messages`), snap => {
    const container = document.getElementById('chatMessages');
    container.innerHTML = '';
    const msgs = snap.val();
    if (msgs) Object.values(msgs).sort((a,b) => a.ts - b.ts).forEach(renderMessage);
    container.scrollTop = container.scrollHeight;
  });

  // 앨범
  onValue(ref(db, `${ROOM_ID}/media`), snap => updateAlbum(snap.val()));

  // 시그널
  listenSignaling();

  // 프로필 UI
  const avatarEl = document.getElementById('myAvatarDisplay');
  if (me.photoURL) {
    avatarEl.innerHTML = `<img src="${me.photoURL}">`;
  } else {
    avatarEl.textContent = me.emoji;
  }
  document.getElementById('myNameDisplay').textContent  = me.name;
  document.getElementById('myEmailDisplay').textContent = me.email;
  document.getElementById('langSelect').value           = myLang;
  document.getElementById('translateToggle').checked    = translateEnabled;

  showScreen('mainScreen');
}

// ── 번역 (LibreTranslate 무료) ──
// ── 번역 (MyMemory — 무료, API 키 불필요) ──
async function translate(text, src, tgt) {
  if (!translateEnabled) return null;
  try {
    // MyMemory: ko↔ja 지원, 하루 5000자 무료
    const langPair = `${src}|${tgt}`;
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${langPair}`;
    const res  = await fetch(url);
    const data = await res.json();
    const result = data?.responseData?.translatedText;
    // MyMemory가 번역 실패 시 원문 그대로 반환하는 경우 걸러냄
    if (result && result !== text) return result;
  } catch {}
  return null;
}

// ── 메시지 전송 ──
window.sendMessage = async function() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';

  // 번역 먼저 실행 (양쪽 모두에게 보이게 하기 위해 전송 전에 번역)
  let translation = null;
  if (translateEnabled) {
    const tgt = myLang === 'ko' ? 'ja' : 'ko'; // 내 언어 반대로
    translation = await translate(text, myLang, tgt);
  }

  push(ref(db, `${ROOM_ID}/messages`), {
    uid: me.name, name: me.name, photoURL: me.photoURL || '',
    lang: myLang, text, translation, type: 'text', ts: Date.now()
  });
};
window.handleKey  = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } };
window.autoResize = el => { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; };

// ── 메시지 렌더 ──
function renderMessage(msg) {
  const container = document.getElementById('chatMessages');
  if (msg.type === 'system') {
    const d = document.createElement('div'); d.className = 'system-msg'; d.textContent = msg.text; container.appendChild(d); return;
  }
  const isMe = msg.uid === me.name;
  const wrap = document.createElement('div'); wrap.className = `msg-wrap ${isMe ? 'me' : 'them'}`;

  if (!isMe) {
    const s = document.createElement('div'); s.className = 'msg-sender';
    if (msg.photoURL) {
      s.innerHTML = `<img src="${msg.photoURL}" style="width:18px;height:18px;border-radius:50%;object-fit:cover;margin-right:4px;vertical-align:middle"> ${msg.name}`;
    } else {
      s.textContent = msg.name;
    }
    wrap.appendChild(s);
  }

  const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
  if (msg.type === 'text') {
    bubble.textContent = msg.text;
  } else if (msg.type === 'image') {
    const d = document.createElement('div'); d.className = 'msg-media';
    const img = document.createElement('img'); img.src = msg.url; img.loading = 'lazy';
    img.onclick = () => openLightbox('image', msg.url); d.appendChild(img); bubble.appendChild(d);
  } else if (msg.type === 'video') {
    const d = document.createElement('div'); d.className = 'msg-media';
    const v = document.createElement('video'); v.src = msg.url; v.controls = true; v.playsinline = true;
    d.appendChild(v); bubble.appendChild(d);
  }
  wrap.appendChild(bubble);

  if (msg.translation && translateEnabled) {
    const tr = document.createElement('div'); tr.className = 'msg-translation'; tr.textContent = msg.translation; wrap.appendChild(tr);
  }
  const t = document.createElement('div'); t.className = 'msg-time'; t.textContent = fmt(msg.ts); wrap.appendChild(t);
  container.appendChild(wrap);
}
const fmt = ts => { const d = new Date(ts); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };

// ── 미디어 전송 ──
window.sendMedia = async function(e) {
  const file = e.target.files[0]; if (!file) return; e.target.value = '';
  const isVideo = file.type.startsWith('video/');
  showToast('업로드 중...');
  const task = uploadBytesResumable(sRef(storage, `${ROOM_ID}/${Date.now()}_${file.name}`), file);
  task.on('state_changed',
    s => showToast(`업로드 ${Math.round(s.bytesTransferred/s.totalBytes*100)}%`),
    err => showToast('실패: ' + err.message),
    async () => {
      const url = await getDownloadURL(task.snapshot.ref);
      push(ref(db, `${ROOM_ID}/messages`), { uid: me.name, name: me.name, photoURL: me.photoURL||'', type: isVideo?'video':'image', url, ts: Date.now() });
      push(ref(db, `${ROOM_ID}/media`),    { uid: me.name, type: isVideo?'video':'image', url, ts: Date.now() });
      showToast('공유 완료!');
    }
  );
};

// ── 앨범 ──
function updateAlbum(media) {
  const grid = document.getElementById('albumGrid'); grid.innerHTML = '';
  if (!media) { grid.innerHTML = '<div class="album-empty" style="grid-column:1/-1;height:300px">아직 공유된 미디어가 없어요</div>'; return; }
  Object.values(media).sort((a,b)=>b.ts-a.ts).forEach(item => {
    const div = document.createElement('div'); div.className = 'album-item';
    if (item.type==='video') {
      const v=document.createElement('video'); v.src=item.url; v.preload='metadata'; div.appendChild(v);
      const ic=document.createElement('div'); ic.className='play-icon'; ic.innerHTML=`<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`; div.appendChild(ic);
      div.onclick=()=>openLightbox('video',item.url);
    } else {
      const img=document.createElement('img'); img.src=item.url; img.loading='lazy'; div.appendChild(img);
      div.onclick=()=>openLightbox('image',item.url);
    }
    grid.appendChild(div);
  });
}

// ── 라이트박스 ──
window.openLightbox = (type, url) => {
  const c=document.getElementById('lightboxContent'); c.innerHTML='';
  if (type==='image') { const i=document.createElement('img'); i.src=url; c.appendChild(i); }
  else { const v=document.createElement('video'); v.src=url; v.controls=true; v.playsinline=true; v.autoplay=true; c.appendChild(v); }
  document.getElementById('lightbox').classList.add('open');
};
window.closeLightbox = () => { document.getElementById('lightbox').classList.remove('open'); document.getElementById('lightboxContent').innerHTML=''; };

// ── WebRTC ──
const ICE = { iceServers: [{ urls:'stun:stun.l.google.com:19302' },{ urls:'stun:stun1.l.google.com:19302' }] };

function listenSignaling() {
  onValue(ref(db, `${ROOM_ID}/signal/${me.name}`), async snap => {
    const sig = snap.val(); if (!sig) return;
    if      (sig.type==='incoming') showIncomingCall(sig);
    else if (sig.type==='offer')    await handleOffer(sig);
    else if (sig.type==='answer' && peerConnection) await peerConnection.setRemoteDescription(new RTCSessionDescription({type:'answer',sdp:sig.sdp}));
    else if (sig.type==='ice'    && peerConnection) { try { await peerConnection.addIceCandidate(new RTCIceCandidate(sig.candidate)); } catch(e){} }
    else if (sig.type==='end')      endCall(true);
  });
}

window.startCall = async function(type) {
  if (peerConnection) { showToast('이미 통화 중'); return; }
  callType = type;
  try { localStream = await navigator.mediaDevices.getUserMedia({ audio:true, video: type==='video'?{facingMode:'user'}:false }); }
  catch { showToast('마이크/카메라 권한이 필요합니다'); return; }
  if (type==='video') document.getElementById('localVidEl').srcObject = localStream;
  await set(ref(db,`${ROOM_ID}/signal/${partner.name}`), { type:'incoming', from:me.name, name:me.name, photoURL:me.photoURL||'', callType:type, ts:Date.now() });
  setupPC(partner.name, true);
  showCallUI();
};

async function handleOffer(sig) {
  callType = sig.callType||'audio';
  try { localStream = await navigator.mediaDevices.getUserMedia({ audio:true, video: callType==='video'?{facingMode:'user'}:false }); }
  catch { showToast('마이크/카메라 권한이 필요합니다'); return; }
  if (callType==='video') document.getElementById('localVidEl').srcObject = localStream;
  setupPC(sig.from, false);
  await peerConnection.setRemoteDescription(new RTCSessionDescription({type:'offer',sdp:sig.sdp}));
  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);
  await set(ref(db,`${ROOM_ID}/signal/${sig.from}`), { type:'answer', from:me.name, sdp:answer.sdp, ts:Date.now() });
  showCallUI();
}

function setupPC(partnerName, isInitiator) {
  peerConnection = new RTCPeerConnection(ICE);
  localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
  peerConnection.onicecandidate = async e => { if (e.candidate) await set(ref(db,`${ROOM_ID}/signal/${partnerName}`), { type:'ice', from:me.name, candidate:e.candidate.toJSON(), ts:Date.now() }); };
  peerConnection.ontrack = e => { document.getElementById('remoteVid').srcObject = e.streams[0]; };
  peerConnection.onconnectionstatechange = () => {
    const s = peerConnection?.connectionState;
    if (s==='connected') { document.getElementById('callStatus').textContent='통화 중'; startTimer(); }
    if (s==='disconnected'||s==='failed') endCall(true);
  };
  if (isInitiator) {
    peerConnection.onnegotiationneeded = async () => {
      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);
      await set(ref(db,`${ROOM_ID}/signal/${partnerName}`), { type:'offer', from:me.name, sdp:offer.sdp, callType, ts:Date.now() });
    };
  }
}

function showCallUI() {
  document.getElementById('callVideoWrap').style.display = callType==='video'?'block':'none';
  document.getElementById('callControls').style.display = 'none';
  document.getElementById('activeCallControls').style.display = 'flex';
  document.getElementById('callStatus').textContent = '연결 중...';
  document.getElementById('callTimer').style.display = 'block';
  switchTab('call');
}

function startTimer() {
  let s=0; callTimerInterval = setInterval(()=>{ s++; document.getElementById('callTimer').textContent=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; },1000);
}

window.endCall = async function(remote=false) {
  if (!remote && peerConnection) await set(ref(db,`${ROOM_ID}/signal/${partner.name}`), { type:'end', from:me.name, ts:Date.now() });
  if (peerConnection)    { peerConnection.close(); peerConnection=null; }
  if (localStream)       { localStream.getTracks().forEach(t=>t.stop()); localStream=null; }
  if (callTimerInterval) { clearInterval(callTimerInterval); callTimerInterval=null; }
  document.getElementById('callVideoWrap').style.display='none';
  document.getElementById('callControls').style.display='flex';
  document.getElementById('activeCallControls').style.display='none';
  document.getElementById('callStatus').textContent='통화 중이 아닙니다';
  document.getElementById('callTimer').textContent='00:00';
  document.getElementById('callTimer').style.display='none';
  document.getElementById('remoteVid').srcObject=null;
  isMuted=false; isVideoOff=false;
};
window.toggleMute  = () => { if (!localStream) return; isMuted=!isMuted; localStream.getAudioTracks().forEach(t=>t.enabled=!isMuted); document.getElementById('muteBtn').style.opacity=isMuted?'0.4':'1'; };
window.toggleVideo = () => { if (!localStream) return; isVideoOff=!isVideoOff; localStream.getVideoTracks().forEach(t=>t.enabled=!isVideoOff); document.getElementById('videoToggleBtn').style.opacity=isVideoOff?'0.4':'1'; };

function showIncomingCall(sig) {
  const av = document.getElementById('incomingAvatar');
  av.innerHTML = sig.photoURL ? `<img src="${sig.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : (partner.emoji||'🌸');
  document.getElementById('incomingName').textContent = sig.name||'상대방';
  document.getElementById('incomingType').textContent = sig.callType==='video'?'📹 영상 통화':'📞 음성 통화';
  document.getElementById('incomingCall').classList.add('show');
  if (navigator.vibrate) navigator.vibrate([300,200,300]);
}
window.acceptCall = () => document.getElementById('incomingCall').classList.remove('show');
window.rejectCall = async () => {
  document.getElementById('incomingCall').classList.remove('show');
  await set(ref(db,`${ROOM_ID}/signal/${partner.name}`), { type:'end', from:me.name, ts:Date.now() });
};

// ── 탭 ──
window.switchTab = tab => {
  ['chat','album','call','profile'].forEach(t => {
    document.getElementById(t==='call'?'callTabPane':`${t}Pane`).classList.add('hidden');
    document.getElementById(`tab-${t}`).classList.remove('active');
  });
  document.getElementById(tab==='call'?'callTabPane':`${tab}Pane`).classList.remove('hidden');
  document.getElementById(`tab-${tab}`).classList.add('active');
};

// ── 설정 ──
window.changeLang = () => { myLang=document.getElementById('langSelect').value; localStorage.setItem(`memo_lang_${me.email}`,myLang); };
window.saveTranslatePref = () => { translateEnabled=document.getElementById('translateToggle').checked; localStorage.setItem('memo_translate',translateEnabled); };
window.doLogout = async () => {
  if (!confirm('로그아웃 할까요?')) return;
  if (peerConnection) endCall();
  await set(ref(db,`${ROOM_ID}/presence/${me.name}`), { online:false });
  await signOut(auth);
};

// ── 토스트 ──
window.showToast = msg => {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),2500);
};
</script>
</body>
