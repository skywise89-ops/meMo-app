<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-title" content="meMo">
<title>meMo</title>
<style>
  :root {
    --bg: #0d0d0f; --surface: #18181c; --surface2: #222228;
    --border: rgba(255,255,255,0.08); --accent: #c8a97e; --accent2: #8fa8c8;
    --text: #f0ede8; --text2: #9a9590; --danger: #c87e7e;
    --bubble-me: #2a2118; --bubble-them: #1a1e24;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  .theme-rose {
    --bg: #fff5f7; --surface: #ffffff; --surface2: #fce8ed;
    --border: rgba(220,100,120,0.12); --accent: #d4607a; --accent2: #b07090;
    --text: #2a1018; --text2: #906070; --danger: #c0392b;
    --bubble-me: #fde8ee; --bubble-them: #f8f0f2;
  }
  .theme-skyblue {
    --bg: #f0f6ff; --surface: #ffffff; --surface2: #e4eefa;
    --border: rgba(80,130,220,0.12); --accent: #4a7fd4; --accent2: #6090b8;
    --text: #101828; --text2: #607090; --danger: #c0392b;
    --bubble-me: #ddeeff; --bubble-them: #eef4ff;
  }
  .theme-purple {
    --bg: #f8f4ff; --surface: #ffffff; --surface2: #ede4ff;
    --border: rgba(140,90,220,0.12); --accent: #8a5cd4; --accent2: #a070c8;
    --text: #180e28; --text2: #806090; --danger: #c0392b;
    --bubble-me: #ecdeff; --bubble-them: #f4f0ff;
  }
  .theme-cream {
    --bg: #fdf8f0; --surface: #ffffff; --surface2: #f5ede0;
    --border: rgba(180,140,80,0.12); --accent: #b8904a; --accent2: #8a7060;
    --text: #1e160a; --text2: #806840; --danger: #c0392b;
    --bubble-me: #fdf0d8; --bubble-them: #f8f0e8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, 'Noto Sans KR', sans-serif; }
  
  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; overflow-x: hidden; }
  .screen.hidden { display: none; }

  /* ── LOGIN ── */
  #loginScreen { background: var(--bg); align-items: center; justify-content: center; gap: 2.5rem; }
  .login-logo { font-size: 3.4rem; font-weight: 200; color: var(--accent); letter-spacing: -2px; }
  .login-logo span { color: var(--accent2); }
  .login-sub { color: var(--text2); font-size: 0.8rem; letter-spacing: 0.15em; }
  .google-btn {
    display: flex; align-items: center; gap: 12px;
    background: white; color: #1f1f1f; border: none; border-radius: 14px;
    padding: 14px 28px; font-size: 1rem; font-weight: 500; cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3); transition: opacity 0.2s, transform 0.1s;
  }
  .google-btn:active { opacity: 0.85; transform: scale(0.97); }
  .google-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
  .login-error { color: var(--danger); font-size: 0.82rem; text-align: center; max-width: 280px; line-height: 1.5; min-height: 1.2em; }

  /* ── LOADING ── */
  #loadingScreen { background: var(--bg); align-items: center; justify-content: center; gap: 1rem; }
  .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text2); font-size: 0.85rem; }

  /* ── TOPBAR ── */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 52px 20px 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .topbar-title { font-size: 1rem; font-weight: 500; }
  .topbar-actions { display: flex; gap: 12px; }
  .icon-btn { background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px; display: flex; align-items: center; border-radius: 8px; transition: color 0.2s; }
  .icon-btn:active { color: var(--accent); }
  .icon-btn.active { color: var(--accent); }
  .icon-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; }

  /* ── MAIN ── */
  #mainScreen { background: var(--bg); }
  .tab-content { flex: 1; overflow: hidden; position: relative; }
  .tab-pane { position: absolute; inset: 0; display: flex; flex-direction: column; overflow: hidden; }
  .tab-pane.hidden { display: none; }
  .tab-bar { display: flex; background: var(--surface); border-top: 1px solid var(--border); padding-bottom: var(--safe-bottom); flex-shrink: 0; }
  .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 0 8px; background: none; border: none; color: var(--text2); font-size: 0.65rem; cursor: pointer; transition: color 0.2s; }
  .tab-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; }
  .tab-btn.active { color: var(--accent); }

  /* ── CHAT ── */
  .chat-messages { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 16px 12px; display: flex; flex-direction: column-reverse; gap: 8px; width: 100%; }
  .chat-messages::-webkit-scrollbar { display: none; }
  .msg-wrap { display: flex; flex-direction: column; max-width: 78%; }
  .msg-wrap.me { align-self: flex-end; align-items: flex-end; }
  .msg-wrap.them { align-self: flex-start; align-items: flex-start; }
  .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 0.95rem; line-height: 1.5; word-break: break-word; }
  .me .msg-bubble { background: var(--bubble-me); border-bottom-right-radius: 4px; border: 1px solid rgba(200,169,126,0.15); }
  .them .msg-bubble { background: var(--bubble-them); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
  .msg-translation { font-size: 0.78rem; color: var(--text2); margin-top: 4px; padding-left: 8px; border-left: 2px solid var(--accent); }
  .me .msg-translation { border-left: none; border-right: 2px solid var(--accent2); padding-left: 0; padding-right: 8px; text-align: right; }
  .msg-time { font-size: 0.68rem; color: var(--text2); margin-top: 3px; padding: 0 4px; display: flex; align-items: center; gap: 3px; justify-content: flex-end; }
  .read-check { display: inline-flex; align-items: center; }
  .read-check svg { width: 14px; height: 14px; }
  .read-check.read svg { stroke: var(--accent2); }
  .read-check.unread svg { stroke: var(--text2); opacity: 0.5; }
  .msg-sender { font-size: 0.72rem; color: var(--text2); margin-bottom: 3px; padding: 0 4px; }
  .msg-media { max-width: 220px; border-radius: 12px; overflow: hidden; }
  .msg-media img { width: 100%; display: block; cursor: pointer; }
  .msg-media video { width: 100%; display: block; border-radius: 8px; }

  /* ── 스티커 메시지 버블 ── */
  .msg-sticker-wrap {
    /* 스티커는 배경 없이 이미지만 표시 */
    background: transparent !important;
    border: none !important;
    padding: 4px !important;
  }
  .msg-sticker-img {
    width: 120px;
    height: 120px;
    object-fit: contain;
    display: block;
    cursor: pointer;
    border-radius: 8px;
    /* 탭 하이라이트 애니메이션 */
    transition: transform 0.12s ease;
  }
  .msg-sticker-img:active { transform: scale(0.92); }


  /* ── 스티커 피커 패널 ── */
  #stickerPanel {
    /* chatPane의 flex 자식으로 입력창 바로 위에 위치 */
    background: var(--surface);
    border-top: 1px solid var(--border);
    z-index: 10;
    display: none;
    flex-direction: column;
    max-height: 300px;
    flex-shrink: 0;
    /* 슬라이드업 애니메이션 */
    overflow: hidden;
    transition: max-height 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  #stickerPanel.open {
    display: flex;
  }
  /* animating: display:flex 전환용 (JS rAF와 함께 사용) */
  #stickerPanel.animating {
    display: flex;
  }
  .sticker-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 8px;
    flex-shrink: 0;
  }
  .sticker-panel-title {
    font-size: 0.78rem;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sticker-panel-title span { font-size: 1rem; }

  .sticker-grid {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 6px 10px 14px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    -webkit-overflow-scrolling: touch;
  }
  .sticker-grid::-webkit-scrollbar { display: none; }
  .sticker-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    padding: 6px 4px;
    border-radius: 12px;
    transition: background 0.15s;
    position: relative;
  }
  .sticker-cell:active { background: var(--surface2); }
  .sticker-cell img {
    width: 68px;
    height: 68px;
    object-fit: contain;
    border-radius: 6px;
    /* 로딩 전 placeholder */
    background: var(--surface2);
  }

  /* 스티커 로딩 상태 */
  .sticker-cell .sticker-loading {
    width: 68px;
    height: 68px;
    border-radius: 6px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    animation: stickerPulse 1.2s ease-in-out infinite;
  }
  @keyframes stickerPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  /* 업로드 미완료 상태 오버레이 */
  .sticker-cell .sticker-not-ready {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
  }

  /* ── 묶음 사진 ── */
  .msg-media-group {
    display: flex; gap: 4px; max-width: 220px;
    overflow-x: auto; overflow-y: hidden;
    scroll-snap-type: x proximity; -webkit-overflow-scrolling: touch;
    border-radius: 4px;
  }
  .msg-media-group::-webkit-scrollbar { display: none; }
  .msg-media-group-item {
    flex: 0 0 auto; width: 130px; height: 140px;
    border-radius: 10px; overflow: hidden; position: relative;
    cursor: pointer; background: var(--surface2);
    scroll-snap-align: start;
  }
  .msg-media-group-item img, .msg-media-group-item video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .msg-media-group-item .play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }
  .msg-media-group-item .play-icon svg { width: 26px; height: 26px; fill: rgba(255,255,255,0.9); }
  .msg-media-group-count {
    position: absolute; bottom: 5px; right: 5px;
    background: rgba(0,0,0,0.55); color: #fff;
    font-size: 0.65rem; padding: 1px 6px; border-radius: 8px;
    line-height: 1.4; pointer-events: none;
  }
  
  .system-msg { text-align: center; color: var(--text2); font-size: 0.75rem; padding: 12px 0; width: 100%; box-sizing: border-box; }
  .chat-input-wrap { display: flex; align-items: flex-end; gap: 8px; padding: 10px 12px; padding-bottom: calc(10px + var(--safe-bottom)); background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  .chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 22px; color: var(--text); padding: 10px 16px; font-size: 0.95rem; outline: none; resize: none; max-height: 120px; min-height: 42px; line-height: 1.4; font-family: inherit; transition: border-color 0.2s; }
  .chat-input:focus { border-color: var(--accent); }
  .chat-send-btn { width: 42px; height: 42px; border-radius: 50%; background: var(--accent); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: opacity 0.2s, transform 0.1s; }
  .chat-send-btn:active { opacity: 0.7; transform: scale(0.93); }
  .chat-send-btn svg { width: 18px; height: 18px; stroke: #0d0d0f; fill: none; stroke-width: 2; }
  .partner-status { font-size: 0.75rem; color: var(--text2); }
  .online-dot { width: 8px; height: 8px; border-radius: 50%; background: #4a7a4a; display: inline-block; margin-right: 6px; }

  /* ── ALBUM ── */
  .album-grid {
    flex: 1; min-height: 0; overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-auto-rows: calc((100vw - 4px) / 3);
    gap: 2px; padding: 2px;
    align-content: start;
  }
  @media (min-width: 600px) {
    .album-grid { grid-template-columns: repeat(4, 1fr); grid-auto-rows: calc((100vw - 6px) / 4); }
  }
  .album-item { overflow: hidden; position: relative; cursor: pointer; background: var(--surface); }
  .album-item img, .album-item video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .album-item .play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }
  .album-item .play-icon svg { width: 32px; height: 32px; fill: rgba(255,255,255,0.9); }
  .album-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 0.9rem; }

  /* ── TODO LIST ── */
  .todo-container { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 24px; }
  .todo-input-wrap { display: flex; gap: 8px; margin-bottom: 8px; }
  .todo-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
  .todo-input:focus { border-color: var(--accent); }
  .todo-add-btn { background: var(--accent); color: var(--bg); border: none; border-radius: 12px; padding: 0 18px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: transform 0.1s; }
  .todo-add-btn:active { transform: scale(0.95); }
  .todo-section-title { font-size: 0.85rem; color: var(--text2); margin-bottom: 12px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .todo-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .todo-list { display: flex; flex-direction: column; gap: 10px; }
  .todo-item { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; display: flex; gap: 14px; align-items: flex-start; transition: opacity 0.2s; }
  .todo-checkbox { width: 24px; height: 24px; border: 2px solid var(--text2); border-radius: 50%; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .todo-item.done .todo-checkbox { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .todo-text { flex: 1; font-size: 0.95rem; line-height: 1.4; word-break: break-word; color: var(--text); transition: color 0.2s; }
  .todo-item.done .todo-text { text-decoration: line-through; color: var(--text2); }
  .todo-meta { font-size: 0.72rem; color: var(--text2); margin-top: 6px; }
  .todo-proof-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 8px 14px; border-radius: 10px; font-size: 0.8rem; cursor: pointer; margin-top: 12px; display: inline-flex; align-items: center; gap: 6px; transition: color 0.2s, border-color 0.2s; }
  .todo-proof-btn:active { background: var(--surface); color: var(--accent); border-color: var(--accent); }
  .todo-proof-media { width: 100%; max-height: 200px; border-radius: 10px; object-fit: cover; margin-top: 12px; cursor: pointer; border: 1px solid var(--border); display: block; }
  .todo-empty { text-align: center; color: var(--text2); font-size: 0.85rem; padding: 20px 0; }

  /* ── LIGHTBOX ── */
  #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  #lightbox.open { opacity: 1; pointer-events: all; }
  #lightbox img, #lightbox video { max-width: 90vw; max-height: 85vh; object-fit: contain; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  #lightbox .close-lb { position: absolute; top: 52px; right: 20px; background: none; border: none; color: white; font-size: 2rem; cursor: pointer; z-index: 101; padding: 8px; }
  #lightbox .lb-nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 46px; height: 46px; border-radius: 50%;
    background: rgba(0,0,0,0.35); border: none; color: white;
    font-size: 1.8rem; line-height: 1; cursor: pointer; z-index: 101;
    display: none; align-items: center; justify-content: center;
  }
  #lightbox .lb-prev { left: 12px; }
  #lightbox .lb-next { right: 12px; }
  #lightbox .lb-counter {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.85); font-size: 0.78rem;
    background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 12px;
    display: none; z-index: 101;
  }

  /* ── INCOMING CALL ── */
  #incomingCall { position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; }
  #incomingCall.show { display: flex; }
  .incoming-name { font-size: 1.8rem; font-weight: 300; color: var(--accent); }
  .incoming-type { font-size: 0.85rem; color: var(--text2); }
  .incoming-btns { display: flex; gap: 40px; margin-top: 1rem; }
  .inc-btn { width: 72px; height: 72px; border-radius: 50%; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
  .inc-btn svg { width: 28px; height: 28px; stroke: white; fill: none; stroke-width: 1.8; }
  .inc-btn span { font-size: 0.7rem; color: white; }
  .inc-btn.accept { background: #4a7a4a; }
  .inc-btn.reject { background: var(--danger); }

  /* ── PROFILE & OTHER ── */
  .profile-header { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 20px 0; }
  .profile-avatar-lg { width: 88px; height: 88px; border-radius: 50%; background: var(--surface2); border: 2px solid var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
  .profile-avatar-lg img { width: 100%; height: 100%; object-fit: cover; }
  .profile-section { background: var(--surface); border-radius: 16px; overflow: hidden; }
  .profile-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); gap: 12px; }
  .profile-row:last-child { border-bottom: none; }
  .profile-row-label { font-size: 0.9rem; color: var(--text2); }
  .lang-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 6px 10px; font-size: 0.85rem; outline: none; cursor: pointer; }
  .danger-btn { background: none; border: 1px solid var(--danger); border-radius: 12px; color: var(--danger); padding: 12px; font-size: 0.9rem; cursor: pointer; width: 100%; }
  .danger-btn:active { background: rgba(200,126,126,0.1); }
  .toggle-sw { position: relative; width: 44px; height: 24px; }
  .toggle-sw input { opacity: 0; width: 0; height: 0; }
  .toggle-sw .slider { position: absolute; inset: 0; background: var(--surface2); border-radius: 24px; border: 1px solid var(--border); cursor: pointer; transition: background 0.2s; }
  .toggle-sw .slider::before { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: var(--text2); top: 2px; left: 2px; transition: transform 0.2s, background 0.2s; }
  .toggle-sw input:checked + .slider { background: rgba(200,169,126,0.2); border-color: var(--accent); }
  .toggle-sw input:checked + .slider::before { transform: translateX(20px); background: var(--accent); }

  .theme-row { display: flex; gap: 12px; padding: 4px 0; flex-wrap: wrap; }
  .theme-dot { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform 0.15s, border-color 0.15s; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
  .theme-dot:active { transform: scale(0.88); }
  .theme-dot.active { border-color: var(--accent); box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent); }

  .reply-bar { display: none; align-items: center; gap: 8px; background: var(--surface2); border-left: 3px solid var(--accent); padding: 8px 14px; font-size: 0.8rem; color: var(--text2); flex-shrink: 0; }
  .reply-bar.show { display: flex; }
  .reply-bar-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .reply-bar-cancel { background: none; border: none; color: var(--text2); font-size: 1.1rem; cursor: pointer; padding: 0 4px; line-height: 1; }

async function compressImageSafe(file, maxWidth = 1600) {
  if (!file.type.startsWith('image/') || file.type.includes('gif')) return file;
  return new Promise((resolve) => {
    const img = new Image();
    const objectUrl = URL.createObjectURL(file);
    img.src = objectUrl;
    img.onload = () => {
      URL.revokeObjectURL(objectUrl);
      let width = img.width, height = img.height;
      if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      if (file.type !== 'image/png') { ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, width, height); }
      ctx.drawImage(img, 0, 0, width, height);
      const targetType = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
      const quality = targetType === 'image/jpeg' ? 0.8 : undefined;
      canvas.toBlob(blob => {
        if (!blob) { resolve(file); return; }
        const ext = targetType === 'image/png' ? '.png' : '.jpg';
        const safeName = file.name.replace(/\.[^/.]+$/, '') + '_compressed' + ext;
        try { resolve(new File([blob], safeName, { type: targetType, lastModified: Date.now() })); }
        catch (e) { blob.name = safeName; resolve(blob); }
      }, targetType, quality);
    };
    img.onerror = () => { URL.revokeObjectURL(objectUrl); resolve(file); };
  });
}

    } else {

    }
  });

  let latestTheirTs = 0;
  let lastReadTimer = null;
  const container = document.getElementById('chatMessages');

  let pressTimer;
  container.addEventListener('touchstart', e => {
    const wrap = e.target.closest('.msg-wrap');
    if (!wrap || !wrap.dataset.key) return;
    const key = wrap.dataset.key;
    const msg = window._loadedMessages[key];
    if (!msg || msg.type !== 'text') return;
    pressTimer = setTimeout(() => showCtxMenu(msg, wrap), 500);
  }, { passive: true });
  container.addEventListener('touchend', () => clearTimeout(pressTimer), { passive: true });
  container.addEventListener('touchmove', () => clearTimeout(pressTimer), { passive: true });
  container.addEventListener('dblclick', e => {
    const wrap = e.target.closest('.msg-wrap');
    if (!wrap || !wrap.dataset.key) return;
    const key = wrap.dataset.key;
    const msg = window._loadedMessages[key];
    if (msg && msg.type === 'text') setReply(msg);
  });

  function updateMyLastRead(ts) {
    if (ts <= 0 || ts === window._myLastReadSent) return;
    clearTimeout(lastReadTimer);
    lastReadTimer = setTimeout(() => {
      window._myLastReadSent = ts;
      set(ref(db, `${ROOM_ID}/lastRead/${me.name}`), ts);
    }, 500);
  }

  const messagesRef = ref(db, `${ROOM_ID}/messages`);
  const initialQuery = query(messagesRef, orderByKey(), limitToLast(50));
  let initialLoadDone = false;

  onChildAdded(initialQuery, snap => {
    const key = snap.key;
    if (seenKeys.has(key)) return;
    seenKeys.add(key);
    const msg = snap.val();
    if (!oldestKey) oldestKey = key;
    renderMessage(msg, key);
    if (msg.uid !== me.name && msg.ts > latestTheirTs) {
      latestTheirTs = msg.ts;
      updateMyLastRead(msg.ts);
      if (msg.ts > enterTime) {
        sendLocalNotif(msg.name, mediaLabel(msg));
      }
    }
    if (!initialLoadDone) {
      clearTimeout(initialLoadTimer);
      initialLoadTimer = setTimeout(() => { initialLoadDone = true; setupTopObserver(); }, 500);
    }
  });

  onChildChanged(messagesRef, snap => {
    const key = snap.key;
    const msg = snap.val();
    if (window._loadedMessages[key]) window._loadedMessages[key].translation = msg.translation;
    const el = container.querySelector(`[data-key="${key}"]`);
    if (!el || !msg.translation || !translateEnabled) return;
    let trEl = el.querySelector('.msg-translation');
    if (!trEl) {
      trEl = document.createElement('div');
      trEl.className = 'msg-translation';

      if (isMe) { trEl.style.cssText = 'border-left:none;border-right:2px solid var(--accent2);padding-left:0;padding-right:8px;text-align:right'; }
      const timeEl = el.querySelector('.msg-time');
      if (timeEl) el.insertBefore(trEl, timeEl); else el.appendChild(trEl);

  document.getElementById('myEmailDisplay').textContent = me.email;
  document.getElementById('langSelect').value           = myLang;
  document.getElementById('translateToggle').checked    = translateEnabled;

  enterTime = Date.now();

/**
 * 스티커 패널 초기화:
 * Firebase Storage에서 이미 업로드된 스티커 URL을 가져와 캐시에 저장,
 * 그리드 셀을 렌더링한다.
 */
async function initStickerPanel() {
  buildStickerGrid(); // 먼저 skeleton UI 렌더링
  await loadStickerUrlsFromStorage(); // 그 다음 URL 채우기
}

/**
 * Storage에서 stickers/peach/ 폴더의 파일 목록을 조회해
 * stickerUrlCache를 채운다.
 * 실패해도 무시 (업로드 안 된 상태일 수 있음).
 */
async function loadStickerUrlsFromStorage() {
  try {
    const listRef = sRef(storage, STICKER_STORAGE_PATH);
    const result  = await listAll(listRef);

    // 병렬로 URL 가져오기
    await Promise.all(result.items.map(async (itemRef) => {
      const fileName = itemRef.name;
      if (!stickerUrlCache.has(fileName)) {
        try {
          const url = await getDownloadURL(itemRef);
          stickerUrlCache.set(fileName, url);
        } catch (e) {
          // 개별 파일 URL 실패는 무시
          console.warn('[Sticker] URL 로드 실패:', fileName, e.code);
        }
      }
    }));

    // 그리드 업데이트 (URL이 채워진 셀만 업데이트)
    refreshStickerGrid();
  } catch (e) {
    // Storage 폴더가 없거나 권한 없을 경우 → 스티커 미표시
    console.log('[Sticker] Storage 조회 실패:', e.code || e.message);
  }
}

/**
 * 스티커 그리드 DOM 생성 (skeleton)
 */
function buildStickerGrid() {
  const grid = document.getElementById('stickerGrid');
  grid.innerHTML = '';
  STICKER_DEFS.forEach(def => {
    const cell = document.createElement('div');
    cell.className = 'sticker-cell';
    cell.dataset.file = def.file;

    // placeholder
    const placeholder = document.createElement('div');
    placeholder.className = 'sticker-loading';
    placeholder.textContent = '🍑';
    cell.appendChild(placeholder);

    // 클릭 이벤트
    cell.addEventListener('click', () => onStickerCellClick(def));

    grid.appendChild(cell);
  });
}

/**
 * 캐시된 URL로 그리드 셀 이미지 업데이트
 */
function refreshStickerGrid() {
  const grid = document.getElementById('stickerGrid');
  STICKER_DEFS.forEach(def => {
    const cell = grid.querySelector(`[data-file="${def.file}"]`);
    if (!cell) return;
    const url = stickerUrlCache.get(def.file);
    if (!url) return; // 아직 업로드 안 됨

    // placeholder → img 교체
    const existing = cell.querySelector('img');
    if (existing) return; // 이미 img 있음

    const placeholder = cell.querySelector('.sticker-loading');
    if (placeholder) placeholder.remove();

    const img = document.createElement('img');
    img.src = url;
    img.loading = 'lazy';
    img.alt = def.label;
    img.draggable = false;
    cell.insertBefore(img, cell.querySelector('.sticker-loading') || null);

    // not-ready 오버레이 제거
    const overlay = cell.querySelector('.sticker-not-ready');
    if (overlay) overlay.remove();
  });
}

/**
 * 스티커 셀 클릭 핸들러
 */
function onStickerCellClick(def) {
  const url = stickerUrlCache.get(def.file);
  if (!url) {
    showToast('스티커가 아직 업로드되지 않았어요. 업로드 버튼을 눌러주세요.');
    return;
  }
  sendSticker(def.file, def.label, url);
  closeStickerPanel();
}

 * 스티커 메시지 전송
 */
function sendSticker(fileName, label, url) {

    uid:    me.name,
    name:   me.name,
    photoURL: me.photoURL || '',
    type:   'sticker',
    stickerFile: fileName,
    stickerLabel: label,
    url,
    ts,
  });
  // 앨범에는 저장 안 함 (스티커는 사진이 아님)
}

function openStickerPanel() {
  const panel = document.getElementById('stickerPanel');
  const btn   = document.getElementById('stickerToggleBtn');
  stickerPanelOpen = true;
  btn.classList.add('active');

  // display:flex 먼저, 다음 프레임에 max-height 확장 (CSS transition 발동)
  panel.style.display = 'flex';
  panel.style.maxHeight = '0px';
  panel.style.overflow  = 'hidden';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      panel.style.transition = 'max-height 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
      panel.style.maxHeight  = '300px';
      panel.classList.add('open');
    });
  });

  // 텍스트 인풋 blur (키보드 내리기)
  document.getElementById('msgInput').blur();
}

function closeStickerPanel() {
  const panel = document.getElementById('stickerPanel');
  const btn   = document.getElementById('stickerToggleBtn');
  stickerPanelOpen = false;
  btn.classList.remove('active');

  panel.style.transition = 'max-height 0.18s ease-in';
  panel.style.maxHeight  = '0px';
  setTimeout(() => {
    panel.classList.remove('open', 'animating');
    panel.style.display    = '';
    panel.style.maxHeight  = '';
    panel.style.transition = '';
    panel.style.overflow   = '';
  }, 180);
}

function renderTodos(data) {
  const activeList = document.getElementById('todoActiveList');
  const doneList = document.getElementById('todoDoneList');
  activeList.innerHTML = '';
  doneList.innerHTML = '';
  if(!data) {
    activeList.innerHTML = '<div class="todo-empty">함께 하고 싶은 일을 추가해보세요!</div>';
    doneList.innerHTML = '<div class="todo-empty">아직 해낸 일이 없어요</div>';
    return;
  }
  const arr = Object.entries(data).map(([key, val]) => ({ key, ...val }));
  const active = arr.filter(t => !t.isDone).sort((a,b) => b.createdAt - a.createdAt);
  const done = arr.filter(t => t.isDone).sort((a,b) => b.completedAt - a.completedAt);
  if(active.length === 0) activeList.innerHTML = '<div class="todo-empty">모든 버킷을 달성했어요!</div>';
  else active.forEach(t => activeList.appendChild(createTodoEl(t)));

// ── 무한 스크롤 ──
// ══════════════════════════════════════════════════
function setupTopObserver() {
  const sentinel = document.getElementById('topSentinel');
  if (!sentinel) return;
  if (!topObserver) {
    topObserver = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && !loadingOlder && hasMoreOlder) loadOlderMessages();
    }, { root: document.getElementById('chatMessages'), rootMargin: '100px' });
  }
  topObserver.observe(sentinel);
}

async function loadOlderMessages() {
  if (loadingOlder || !hasMoreOlder || !oldestKey) return;
  loadingOlder = true;
  const cm = document.getElementById('chatMessages');
  const sentinel = document.getElementById('topSentinel');
  try {
    const olderQuery = query(ref(db, `${ROOM_ID}/messages`), orderByKey(), endBefore(oldestKey), limitToLast(20));
    const snapshot = await get(olderQuery);
    if (!snapshot.exists()) { hasMoreOlder = false; loadingOlder = false; return; }
    const children = [];
    snapshot.forEach(child => children.push({ key: child.key, val: child.val() }));
    if (children.length < 20) hasMoreOlder = false;
    if (children.length === 0) { loadingOlder = false; return; }
    oldestKey = children[0].key;
    const currentOldestDOM = sentinel.previousElementSibling;
    if (currentOldestDOM && currentOldestDOM.classList.contains('date-sep')) cm.removeChild(currentOldestDOM);
    const wraps = cm.querySelectorAll('.msg-wrap, .system-msg');
    const currentOldestWrap = wraps.length > 0 ? wraps[wraps.length - 1] : null;
    let nextGroupDate = currentOldestWrap ? currentOldestWrap.dataset.date : '';
    const fragment = document.createDocumentFragment();
    for (let i = children.length - 1; i >= 0; i--) {
      const item = children[i];
      const wrap = createMessageElement(item.val, item.key);
      const currentDateStr = getDateStr(item.val.ts);
      wrap.dataset.date = currentDateStr;
      if (i === children.length - 1 && nextGroupDate && currentDateStr !== nextGroupDate) {
        const sep = document.createElement('div'); sep.className = 'date-sep'; sep.textContent = nextGroupDate;
        fragment.appendChild(sep);
      }
      fragment.appendChild(wrap);
      const nextMsg = children[i - 1];
      if (nextMsg) {
        if (currentDateStr !== getDateStr(nextMsg.val.ts)) {
          const sep = document.createElement('div'); sep.className = 'date-sep'; sep.textContent = currentDateStr;
          fragment.appendChild(sep);
        }
      } else {
        const sep = document.createElement('div'); sep.className = 'date-sep'; sep.textContent = currentDateStr;
        fragment.appendChild(sep);
      }
    }
    cm.insertBefore(fragment, sentinel);
  } catch (err) {
    console.error('과거 메시지 로드 실패:', err);
  } finally {
    requestAnimationFrame(() => { loadingOlder = false; });
  }
}

async function translate(text, src, tgt) {
  try {
    const url  = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${src}&tl=${tgt}&dt=t&q=${encodeURIComponent(text)}`;
    const res  = await fetch(url);
    if (res.ok) {
      const data = await res.json();
      const translated = data?.[0]?.map(x => x?.[0]).filter(Boolean).join('');
      if (translated) return translated;
    }
  } catch {}
  try {
    const res  = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${src}|${tgt}`);
    const data = await res.json();
    if (data?.responseStatus === 200 && data?.responseData?.translatedText) return data.responseData.translatedText;
  } catch {}
  return null;
}

/**
 * 메시지 타입별 레이블 (알림/인용 표시용)
 * sticker 타입 추가
 */
function mediaLabel(msg) {
  if (!msg) return '';
  if (msg.type === 'text')    return msg.text || '';
  if (msg.type === 'image')   return '📷 사진';
  if (msg.type === 'video')   return '🎥 영상';
  if (msg.type === 'sticker') return `🍑 스티커 (${msg.stickerLabel || ''})`;
  if (msg.type === 'album') {
    const n = Array.isArray(msg.items) ? msg.items.length : (msg.count || 0);
    return n ? `📷 사진 ${n}장` : '📷 사진';
  }
  return '';
}

/**
 * 메시지 DOM 엘리먼트 생성
 * ── sticker 타입 케이스 추가 ──
 */
function createMessageElement(msg, key) {
  if (msg.type === 'system') {
    const wrap = document.createElement('div');
    wrap.className = 'system-msg';
    if (key) wrap.dataset.key = key;
    wrap.textContent = msg.text;
    window._loadedMessages[key] = msg;
    return wrap;
  }

  const isMe = msg.uid === me.name;
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${isMe ? 'me' : 'them'}`;
  if (key) wrap.dataset.key = key;

  if (!isMe) {
    const s = document.createElement('div'); s.className = 'msg-sender';
    if (msg.photoURL) {
      const img = document.createElement('img');
      img.src = sanitize(msg.photoURL || '');
      img.style.cssText = 'width:18px;height:18px;border-radius:50%;object-fit:cover;margin-right:4px;vertical-align:middle';
      s.appendChild(img);
      s.appendChild(document.createTextNode(' ' + sanitize(msg.name || '')));
    } else { s.textContent = msg.name; }
    wrap.appendChild(s);
  }

  if (msg.replyTo) {
    const quote = document.createElement('div');
    quote.className = 'msg-quote';
    quote.textContent = '↩ ' + (msg.replyTo.text || mediaLabel(msg.replyTo));
    wrap.appendChild(quote);
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (msg.type === 'text') {
    const escapedText = msg.text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    bubble.innerHTML = escapedText
      .replace(urlRegex, (url) => `<a href="${url}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" style="color:var(--accent2);text-decoration:underline;word-break:break-all;">${url}</a>`)
      .replace(/\n/g, '<br>');
  }
  else if (msg.type === 'sticker') {
    // ── 스티커 버블: 배경 없이 이미지만 ──
    bubble.classList.add('msg-sticker-wrap');
    const img = document.createElement('img');
    img.className = 'msg-sticker-img';
    img.alt = msg.stickerLabel || '스티커';
    img.loading = 'lazy';

    // URL 결정: 메시지에 저장된 url 우선, 없으면 캐시 조회
    const stickerUrl = msg.url || stickerUrlCache.get(msg.stickerFile) || '';
    if (stickerUrl) {
      // URL 있을 때만 src 할당 (빈 src 금지 → 브라우저 페이지 재요청 방지)
      img.src = stickerUrl;
      img.onclick = () => openLightbox('image', stickerUrl);
    } else {
      // URL 없음 = 아직 미업로드 상태 → placeholder 표시
      img.style.cssText = 'width:120px;height:120px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:2rem;';
      img.alt = '🍑';
    }

    bubble.appendChild(img);
  }
  else if (msg.type === 'image') {
    const d = document.createElement('div'); d.className = 'msg-media';
    const img = document.createElement('img'); img.src = msg.url; img.loading = 'lazy';
    img.onclick = () => openLightbox('image', msg.url); d.appendChild(img); bubble.appendChild(d);
  }
  else if (msg.type === 'video') {
    const d = document.createElement('div'); d.className = 'msg-media';
    const v = document.createElement('video'); v.src = msg.url; v.controls = true; v.playsinline = true;
    d.appendChild(v); bubble.appendChild(d);
  }
  else if (msg.type === 'album') {
    const items = Array.isArray(msg.items) ? msg.items : [];
    const group = document.createElement('div'); group.className = 'msg-media-group';
    items.forEach((item, idx) => {
      const cell = document.createElement('div'); cell.className = 'msg-media-group-item';
      if (item.type === 'video') {
        const v = document.createElement('video'); v.src = item.url; v.preload = 'metadata'; v.muted = true; v.playsinline = true;
        cell.appendChild(v);
        const ic = document.createElement('div'); ic.className = 'play-icon';
        ic.innerHTML = `<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
        cell.appendChild(ic);
      } else {
        const img = document.createElement('img'); img.src = item.url; img.loading = 'lazy'; cell.appendChild(img);
      }
      if (items.length > 1) {
        const badge = document.createElement('div'); badge.className = 'msg-media-group-count';
        badge.textContent = `${idx + 1}/${items.length}`;
        cell.appendChild(badge);
      }
      cell.onclick = () => openLightbox(item.type, item.url, items, idx);
      group.appendChild(cell);
    });
    bubble.appendChild(group);
  }

  wrap.appendChild(bubble);

  // 번역 (스티커는 번역 없음)
  if (msg.translation && translateEnabled && msg.type !== 'sticker') {
    const tr = document.createElement('div'); tr.className = 'msg-translation'; tr.textContent = msg.translation; wrap.appendChild(tr);
  }

  const t = document.createElement('div'); t.className = 'msg-time';
  t.appendChild(document.createTextNode(fmt(msg.ts)));
  if (isMe) {
    const check = document.createElement('span');
    check.dataset.ts = msg.ts;
    check.className = msg.ts <= partnerLastRead ? 'read-check read' : 'read-check unread';
    check.innerHTML  = msg.ts <= partnerLastRead ? CHECK_DOUBLE : CHECK_SINGLE;
    t.appendChild(check);
  }
  wrap.appendChild(t);

  window._loadedMessages[key] = msg;
  return wrap;
}

function renderMessage(msg, key) {
  const container = document.getElementById('chatMessages');
  if (container.querySelector(`[data-key="${key}"]`)) return;
  const wrap = createMessageElement(msg, key);
  wrap.dataset.date = getDateStr(msg.ts);
  container.prepend(wrap);
  if (wrap.dataset.date !== liveLastDateStr) {
    liveLastDateStr = wrap.dataset.date;
    const sep = document.createElement('div');
    sep.className = 'date-sep';
    sep.textContent = wrap.dataset.date;
    wrap.after(sep);
  }
}

const fmt = ts => { const d = new Date(ts); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };

function uploadOneFile(file, progressPrefix) {
  return new Promise(async (resolve, reject) => {
    try {
      const targetFile = await compressImageSafe(file);
      const isVideo = targetFile.type.startsWith('video/');
      const safeName = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}_${targetFile.name || 'media'}`;
      const task = uploadBytesResumable(sRef(storage, `${ROOM_ID}/${safeName}`), targetFile);
      task.on('state_changed',
        s => showToast(`${progressPrefix}업로드 ${Math.round(s.bytesTransferred / s.totalBytes * 100)}%`),
        err => reject(err),
        async () => {
          try {
            const url = await getDownloadURL(task.snapshot.ref);
            resolve({ url, type: isVideo ? 'video' : 'image' });
          } catch (err) { reject(err); }
        }
      );
    } catch (e) { reject(e); }
  });
}

async function sendSingleMedia(file) {
  showToast('업로드 중...');
  try {
    const { url, type } = await uploadOneFile(file, '');
    const ts = Date.now();
    push(ref(db, `${ROOM_ID}/messages`), { uid: me.name, name: me.name, photoURL: me.photoURL || '', type, url, ts });
    push(ref(db, `${ROOM_ID}/media`),    { uid: me.name, type, url, ts });
    showToast('공유 완료!');
  } catch (err) { showToast('실패: ' + err.message); }
}

async function sendMediaGroup(files) {
  const total = files.length;
  const items = [];
  const baseTs = Date.now();
  try {
    for (let i = 0; i < total; i++) {
      const { url, type } = await uploadOneFile(files[i], `(${i + 1}/${total}) `);
      items.push({ url, type });
      push(ref(db, `${ROOM_ID}/media`), { uid: me.name, type, url, ts: baseTs + i });
    }
    push(ref(db, `${ROOM_ID}/messages`), { uid: me.name, name: me.name, photoURL: me.photoURL || '', type: 'album', items, ts: baseTs + total });
    showToast(`사진 ${total}장 공유 완료!`);
  } catch (err) { showToast('실패: ' + err.message); }
}

window.sendMedia = async function(e) {
  const files = Array.from(e.target.files || []);
  e.target.value = '';
  if (files.length === 0) return;
  if (files.length === 1) await sendSingleMedia(files[0]);
  else await sendMediaGroup(files);
};

let lightboxGallery = null;

function renderLightboxItem(type, url) {
  const c = document.getElementById('lightboxContent'); c.innerHTML = '';

function updateLightboxNav() {
  const prevBtn = document.getElementById('lbPrev');
  const nextBtn = document.getElementById('lbNext');
  const counter = document.getElementById('lbCounter');
  if (lightboxGallery && lightboxGallery.items.length > 1) {
    prevBtn.style.display = 'flex'; nextBtn.style.display = 'flex';
    counter.style.display = 'block';
    counter.textContent = `${lightboxGallery.index + 1} / ${lightboxGallery.items.length}`;
  } else {
    prevBtn.style.display = 'none'; nextBtn.style.display = 'none';
    counter.style.display = 'none';
  }
}

window.lightboxNav = dir => {
  if (!lightboxGallery) return;
  const n = lightboxGallery.items.length;
  lightboxGallery.index = (lightboxGallery.index + dir + n) % n;
  const item = lightboxGallery.items[lightboxGallery.index];
  renderLightboxItem(item.type, item.url);
  updateLightboxNav();
};

window.openLightbox = (type, url, items, index) => {
  lightboxGallery = (Array.isArray(items) && items.length > 1) ? { items, index: index || 0 } : null;
  renderLightboxItem(type, url);
  updateLightboxNav();
  const lb = document.getElementById('lightbox');
  lb.classList.add('open');
  lb.onclick = e => { if (e.target === lb) closeLightbox(); };
};
window.closeLightbox = () => {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxContent').innerHTML = '';
  lightboxGallery = null;
};
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') { closeLightbox(); return; }
  if (lightboxGallery) {
    if (e.key === 'ArrowLeft') lightboxNav(-1);
    else if (e.key === 'ArrowRight') lightboxNav(1);
  }
});

function getDateStr(ts) {
  const d = new Date(ts);
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
}

window.scrollToLatest = function() { document.getElementById('chatMessages').scrollTop = 0; };

document.addEventListener('DOMContentLoaded', () => {
  const cm = document.getElementById('chatMessages');
  const btn = document.getElementById('scrollBottomBtn');
  if (cm && btn) {
    cm.addEventListener('scroll', () => {
      btn.classList.toggle('show', Math.abs(cm.scrollTop) > 100);
    }, { passive: true });
  }
});

let searchMatches = [], searchIdx = -1;
window.toggleSearch = function() {
  const bar = document.getElementById('searchBar');
  const isOpen = bar.classList.toggle('show');
  if (isOpen) { document.getElementById('searchInput').focus(); } else { clearSearch(); }
};
window.doSearch = function() {
  clearSearchHighlights();
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) { document.getElementById('searchCount').textContent = ''; searchMatches = []; return; }
  const bubbles = document.querySelectorAll('#chatMessages .msg-bubble');
  searchMatches = [];
  bubbles.forEach(b => { if (b.textContent.toLowerCase().includes(q)) { b.classList.add('msg-highlight'); searchMatches.push(b); } });
  searchMatches.reverse();
  searchIdx = searchMatches.length > 0 ? 0 : -1;
  document.getElementById('searchCount').textContent = searchMatches.length > 0 ? `${searchIdx+1}/${searchMatches.length}` : '0건';
  if (searchMatches.length > 0) searchMatches[0].scrollIntoView({ block: 'center' });
};
window.searchNext = function() {
  if (searchMatches.length === 0) return;
  searchIdx = (searchIdx + 1) % searchMatches.length;
  searchMatches[searchIdx].scrollIntoView({ block: 'center' });
  document.getElementById('searchCount').textContent = `${searchIdx+1}/${searchMatches.length}`;
};
window.searchPrev = function() {
  if (searchMatches.length === 0) return;
  searchIdx = (searchIdx - 1 + searchMatches.length) % searchMatches.length;
  searchMatches[searchIdx].scrollIntoView({ block: 'center' });
  document.getElementById('searchCount').textContent = `${searchIdx+1}/${searchMatches.length}`;
};
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchCount').textContent = '';
  clearSearchHighlights();
  searchMatches = []; searchIdx = -1;
}
function clearSearchHighlights() { document.querySelectorAll('.msg-highlight').forEach(el => el.classList.remove('msg-highlight')); }

let ctxTargetMsg = null;
const ctxMenu = document.getElementById('ctxMenu');

function showCtxMenu(msg, wrap) {
  ctxTargetMsg = msg;
  const rect = wrap.getBoundingClientRect();
  const menuH = 100;
  let top = rect.bottom + 6;
  if (top + menuH > window.innerHeight - 20) top = rect.top - menuH - 6;
  ctxMenu.style.top  = `${top}px`;
  const isMe = msg.uid === me.name;
  if (isMe) { ctxMenu.style.right = `${window.innerWidth - rect.right}px`; ctxMenu.style.left = 'auto'; }
  else       { ctxMenu.style.left = `${rect.left}px`; ctxMenu.style.right = 'auto'; }
  ctxMenu.classList.add('show');
  if (navigator.vibrate) navigator.vibrate(30);
}
function hideCtxMenu() { ctxMenu.classList.remove('show'); ctxTargetMsg = null; }

document.getElementById('ctxReply').addEventListener('click', () => { if (ctxTargetMsg) setReply(ctxTargetMsg); hideCtxMenu(); });
document.getElementById('ctxArchive').addEventListener('click', () => { if (ctxTargetMsg) saveToArchive(ctxTargetMsg); hideCtxMenu(); });
document.addEventListener('touchstart', e => { if (ctxMenu.classList.contains('show') && !ctxMenu.contains(e.target)) hideCtxMenu(); }, { passive: true });
document.addEventListener('click', e => { if (ctxMenu.classList.contains('show') && !ctxMenu.contains(e.target)) hideCtxMenu(); });

function archivePath() { return `${ROOM_ID}/archive/${me.name}`; }

async function saveToArchive(msg) {
  const item = {
    text:    msg.type === 'sticker' ? `🍑 ${msg.stickerLabel||'스티커'}` : (msg.text || null),
    type:    msg.type || 'text',
    url:     msg.url  || null,
    name:    msg.name || '',
    uid:     msg.uid  || '',
    ts:      msg.ts   || Date.now(),
    savedAt: Date.now()
  };
  await push(ref(db, archivePath()), item);
  showToast('보관함에 저장됐어요 🔖');
}

async function deleteFromArchive(archiveKey) {
  await set(ref(db, `${archivePath()}/${archiveKey}`), null);
}

function renderArchiveList(data) {
  const list = document.getElementById('archiveList');
  list.innerHTML = '';
  if (!data) { list.innerHTML = '<div class="archive-empty">보관된 메시지가 없어요</div>'; return; }
  const items = Object.entries(data).sort((a,b) => b[1].savedAt - a[1].savedAt);
  items.forEach(([key, item]) => {
    const div = document.createElement('div'); div.className = 'archive-item';
    const meta = document.createElement('div'); meta.className = 'archive-item-meta';
    const senderSpan = document.createElement('span'); senderSpan.className = 'archive-item-sender'; senderSpan.textContent = sanitize(item.name) || '알 수 없음';
    const timeSpan = document.createElement('span'); timeSpan.textContent = fmtFull(item.ts);
    meta.appendChild(senderSpan); meta.appendChild(timeSpan); div.appendChild(meta);
    if (item.type === 'text' && item.text) {
      const p = document.createElement('div'); p.className = 'archive-item-text'; p.textContent = item.text; div.appendChild(p);
    } else if (item.type === 'sticker' && item.text) {
      const p = document.createElement('div'); p.className = 'archive-item-text'; p.textContent = item.text; div.appendChild(p);
      if (item.url) {
        const wrap2 = document.createElement('div'); wrap2.className = 'archive-item-media';
        const img = document.createElement('img'); img.src = item.url; img.loading = 'lazy';
        img.onclick = () => openLightbox('image', item.url); wrap2.appendChild(img); div.appendChild(wrap2);
      }
    } else if ((item.type === 'image' || item.type === 'video') && item.url) {
      const wrap2 = document.createElement('div'); wrap2.className = 'archive-item-media';
      if (item.type === 'image') {
        const img = document.createElement('img'); img.src = item.url; img.loading = 'lazy';
        img.onclick = () => openLightbox('image', item.url); wrap2.appendChild(img);
      } else {
        const v = document.createElement('video'); v.src = item.url; v.controls = true; v.playsinline = true; wrap2.appendChild(v);
      }
      div.appendChild(wrap2);
    }
    const delBtn = document.createElement('button'); delBtn.className = 'archive-del'; delBtn.textContent = '✕';
    delBtn.onclick = () => deleteFromArchive(key); div.appendChild(delBtn);
    list.appendChild(div);
  });
}

function fmtFull(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function listenArchive() { onValue(ref(db, archivePath()), snap => renderArchiveList(snap.val())); }

window.showToast = msg => {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),2500);
};
</script>
