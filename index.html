<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-title" content="meMo">
<title>meMo</title>

<style>
:root {
  --bg:#0d0d0f;
  --surface:#18181c;
  --surface2:#222228;
  --border:rgba(255,255,255,.08);
  --accent:#c8a97e;
  --accent2:#8fa8c8;
  --text:#f0ede8;
  --text2:#9a9590;
  --danger:#c87e7e;
  --bubble-me:#2a2118;
  --bubble-them:#1a1e24;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}

.theme-rose {
  --bg:#fff5f7;
  --surface:#fff;
  --surface2:#fce8ed;
  --border:rgba(220,100,120,.12);
  --accent:#d4607a;
  --accent2:#b07090;
  --text:#2a1018;
  --text2:#906070;
  --danger:#c0392b;
  --bubble-me:#fde8ee;
  --bubble-them:#f8f0f2;
}

.theme-skyblue {
  --bg:#f0f6ff;
  --surface:#fff;
  --surface2:#e4eefa;
  --border:rgba(80,130,220,.12);
  --accent:#4a7fd4;
  --accent2:#6090b8;
  --text:#101828;
  --text2:#607090;
  --danger:#c0392b;
  --bubble-me:#ddeeff;
  --bubble-them:#eef4ff;
}

.theme-purple {
  --bg:#f8f4ff;
  --surface:#fff;
  --surface2:#ede4ff;
  --border:rgba(140,90,220,.12);
  --accent:#8a5cd4;
  --accent2:#a070c8;
  --text:#180e28;
  --text2:#806090;
  --danger:#c0392b;
  --bubble-me:#ecdeff;
  --bubble-them:#f4f0ff;
}

.theme-cream {
  --bg:#fdf8f0;
  --surface:#fff;
  --surface2:#f5ede0;
  --border:rgba(180,140,80,.12);
  --accent:#b8904a;
  --accent2:#8a7060;
  --text:#1e160a;
  --text2:#806840;
  --danger:#c0392b;
  --bubble-me:#fdf0d8;
  --bubble-them:#f8f0e8;
}

* {
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

html,
body {
  height:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,"Noto Sans KR",sans-serif;
}

.screen {
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  overflow-x:hidden;
}

.screen.hidden {
  display:none;
}

#loginScreen {
  background:var(--bg);
  align-items:center;
  justify-content:center;
  gap:2.5rem;
}

.login-logo {
  font-size:3.4rem;
  font-weight:200;
  color:var(--accent);
  letter-spacing:-2px;
}

.login-logo span {
  color:var(--accent2);
}

.login-sub {
  color:var(--text2);
  font-size:.8rem;
  letter-spacing:.15em;
}

.google-btn {
  display:flex;
  align-items:center;
  gap:12px;
  background:#fff;
  color:#1f1f1f;
  border:none;
  border-radius:14px;
  padding:14px 28px;
  font-size:1rem;
  font-weight:500;
  cursor:pointer;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
  transition:opacity .2s,transform .1s;
}

.google-btn:active {
  opacity:.85;
  transform:scale(.97);
}

.google-btn svg {
  width:22px;
  height:22px;
  flex-shrink:0;
}

.login-error {
  color:var(--danger);
  font-size:.82rem;
  text-align:center;
  max-width:280px;
  line-height:1.5;
  min-height:1.2em;
}

#loadingScreen {
  background:var(--bg);
  align-items:center;
  justify-content:center;
  gap:1rem;
}

.spinner {
  width:36px;
  height:36px;
  border:2px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
}

@keyframes spin {
  to { transform:rotate(360deg); }
}

.loading-text {
  color:var(--text2);
  font-size:.85rem;
}

.topbar {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:52px 20px 12px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

.topbar-title {
  font-size:1rem;
  font-weight:500;
}

.topbar-actions {
  display:flex;
  gap:12px;
}

.icon-btn {
  background:none;
  border:none;
  color:var(--text2);
  cursor:pointer;
  padding:4px;
  display:flex;
  align-items:center;
  border-radius:8px;
  transition:color .2s;
}

.icon-btn:active,
.icon-btn.active {
  color:var(--accent);
}

.icon-btn svg {
  width:22px;
  height:22px;
  stroke:currentColor;
  fill:none;
  stroke-width:1.5;
}

#mainScreen {
  background:var(--bg);
}

.tab-content {
  flex:1;
  overflow:hidden;
  position:relative;
}

.tab-pane {
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.tab-pane.hidden {
  display:none;
}

.tab-bar {
  display:flex;
  background:var(--surface);
  border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom);
  flex-shrink:0;
}

.tab-btn {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  padding:10px 0 8px;
  background:none;
  border:none;
  color:var(--text2);
  font-size:.65rem;
  cursor:pointer;
  transition:color .2s;
}

.tab-btn svg {
  width:22px;
  height:22px;
  stroke:currentColor;
  fill:none;
  stroke-width:1.5;
}

.tab-btn.active {
  color:var(--accent);
}

/* 핵심: column-reverse 제거 */
.chat-messages {
  flex:1;
  min-height:0;
  overflow-y:auto;
  overflow-x:hidden;
  padding:16px 12px;
  display:flex;
  flex-direction:column;
  gap:8px;
  width:100%;
  -webkit-overflow-scrolling:touch;
}

.chat-messages::-webkit-scrollbar {
  display:none;
}

.msg-wrap {
  display:flex;
  flex-direction:column;
  max-width:78%;
}

.msg-wrap.me {
  align-self:flex-end;
  align-items:flex-end;
}

.msg-wrap.them {
  align-self:flex-start;
  align-items:flex-start;
}

.msg-bubble {
  padding:10px 14px;
  border-radius:18px;
  font-size:.95rem;
  line-height:1.5;
  word-break:break-word;
}

.me .msg-bubble {
  background:var(--bubble-me);
  border-bottom-right-radius:4px;
  border:1px solid rgba(200,169,126,.15);
}

.them .msg-bubble {
  background:var(--bubble-them);
  border-bottom-left-radius:4px;
  border:1px solid var(--border);
}

.msg-translation {
  font-size:.78rem;
  color:var(--text2);
  margin-top:4px;
  padding-left:8px;
  border-left:2px solid var(--accent);
}

.me .msg-translation {
  border-left:none;
  border-right:2px solid var(--accent2);
  padding-left:0;
  padding-right:8px;
  text-align:right;
}

.msg-time {
  font-size:.68rem;
  color:var(--text2);
  margin-top:3px;
  padding:0 4px;
  display:flex;
  align-items:center;
  gap:3px;
  justify-content:flex-end;
}

.read-check {
  display:inline-flex;
  align-items:center;
}

.read-check svg {
  width:14px;
  height:14px;
}

.read-check.read svg {
  stroke:var(--accent2);
}

.read-check.unread svg {
  stroke:var(--text2);
  opacity:.5;
}

.msg-sender {
  font-size:.72rem;
  color:var(--text2);
  margin-bottom:3px;
  padding:0 4px;
}

.msg-media {
  max-width:220px;
  border-radius:12px;
  overflow:hidden;
}

.msg-media img,
.msg-media video {
  width:100%;
  display:block;
}

.msg-media img {
  cursor:pointer;
}

.msg-sticker-wrap {
  background:transparent !important;
  border:none !important;
  padding:4px !important;
}

.msg-sticker-img {
  width:120px;
  height:120px;
  object-fit:contain;
  display:block;
  cursor:pointer;
  border-radius:8px;
  transition:transform .12s ease;
}

.msg-sticker-img:active {
  transform:scale(.92);
}

#stickerPanel {
  background:var(--surface);
  border-top:1px solid var(--border);
  z-index:10;
  display:none;
  flex-direction:column;
  max-height:300px;
  flex-shrink:0;
  overflow:hidden;
  transition:max-height .22s cubic-bezier(.25,.46,.45,.94);
}

#stickerPanel.open,
#stickerPanel.animating {
  display:flex;
}

.sticker-panel-header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 14px 8px;
  flex-shrink:0;
}

.sticker-panel-title {
  font-size:.78rem;
  color:var(--text2);
  display:flex;
  align-items:center;
  gap:6px;
}

.sticker-panel-title span {
  font-size:1rem;
}

.sticker-grid {
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:6px 10px 14px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  -webkit-overflow-scrolling:touch;
}

.sticker-grid::-webkit-scrollbar {
  display:none;
}

.sticker-cell {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  cursor:pointer;
  padding:6px 4px;
  border-radius:12px;
  transition:background .15s;
  position:relative;
}

.sticker-cell:active {
  background:var(--surface2);
}

.sticker-cell img {
  width:68px;
  height:68px;
  object-fit:contain;
  border-radius:6px;
  background:var(--surface2);
}

.sticker-cell .sticker-loading {
  width:68px;
  height:68px;
  border-radius:6px;
  background:var(--surface2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.4rem;
  animation:stickerPulse 1.2s ease-in-out infinite;
}

@keyframes stickerPulse {
  0%,100% { opacity:.6; }
  50% { opacity:1; }
}

.msg-media-group {
  display:flex;
  gap:4px;
  max-width:220px;
  overflow-x:auto;
  overflow-y:hidden;
  scroll-snap-type:x proximity;
  -webkit-overflow-scrolling:touch;
  border-radius:4px;
}

.msg-media-group::-webkit-scrollbar {
  display:none;
}

.msg-media-group-item {
  flex:0 0 auto;
  width:130px;
  height:140px;
  border-radius:10px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  background:var(--surface2);
  scroll-snap-align:start;
}

.msg-media-group-item img,
.msg-media-group-item video {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.msg-media-group-item .play-icon {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.3);
}

.msg-media-group-item .play-icon svg {
  width:26px;
  height:26px;
  fill:rgba(255,255,255,.9);
}

.msg-media-group-count {
  position:absolute;
  bottom:5px;
  right:5px;
  background:rgba(0,0,0,.55);
  color:#fff;
  font-size:.65rem;
  padding:1px 6px;
  border-radius:8px;
  line-height:1.4;
  pointer-events:none;
}

.system-msg {
  text-align:center;
  color:var(--text2);
  font-size:.75rem;
  padding:12px 0;
  width:100%;
}

.chat-input-wrap {
  display:flex;
  align-items:flex-end;
  gap:8px;
  padding:10px 12px;
  padding-bottom:calc(10px + var(--safe-bottom));
  background:var(--surface);
  border-top:1px solid var(--border);
  flex-shrink:0;
}

.chat-input {
  flex:1;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:22px;
  color:var(--text);
  padding:10px 16px;
  font-size:.95rem;
  outline:none;
  resize:none;
  max-height:120px;
  min-height:42px;
  line-height:1.4;
  font-family:inherit;
}

.chat-input:focus {
  border-color:var(--accent);
}

.chat-send-btn {
  width:42px;
  height:42px;
  border-radius:50%;
  background:var(--accent);
  border:none;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
}

.chat-send-btn svg {
  width:18px;
  height:18px;
  stroke:#0d0d0f;
  fill:none;
  stroke-width:2;
}

.partner-status {
  font-size:.75rem;
  color:var(--text2);
}

.online-dot {
  width:8px;
  height:8px;
  border-radius:50%;
  background:#4a7a4a;
  display:inline-block;
  margin-right:6px;
}

.album-grid {
  flex:1;
  min-height:0;
  overflow-y:auto;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-auto-rows:calc((100vw - 4px)/3);
  gap:2px;
  padding:2px;
  align-content:start;
}

.album-item {
  overflow:hidden;
  position:relative;
  cursor:pointer;
  background:var(--surface);
}

.album-item img,
.album-item video {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.album-item .play-icon {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.3);
}

.album-item .play-icon svg {
  width:32px;
  height:32px;
  fill:rgba(255,255,255,.9);
}

.album-empty {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--text2);
  font-size:.9rem;
}

.todo-container {
  flex:1;
  overflow-y:auto;
  padding:20px 16px;
  display:flex;
  flex-direction:column;
  gap:24px;
}

.todo-input-wrap {
  display:flex;
  gap:8px;
  margin-bottom:8px;
}

.todo-input {
  flex:1;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px 16px;
  color:var(--text);
  font-size:.95rem;
  outline:none;
}

.todo-input:focus {
  border-color:var(--accent);
}

.todo-add-btn {
  background:var(--accent);
  color:var(--bg);
  border:none;
  border-radius:12px;
  padding:0 18px;
  font-weight:600;
  font-size:.9rem;
  cursor:pointer;
}

.todo-section-title {
  font-size:.85rem;
  color:var(--text2);
  margin-bottom:12px;
  font-weight:500;
  display:flex;
  align-items:center;
  gap:8px;
}

.todo-section-title::after {
  content:"";
  flex:1;
  height:1px;
  background:var(--border);
}

.todo-list {
  display:flex;
  flex-direction:column;
  gap:10px;
}

.todo-item {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  display:flex;
  gap:14px;
  align-items:flex-start;
}

.todo-checkbox {
  width:24px;
  height:24px;
  border:2px solid var(--text2);
  border-radius:50%;
  flex-shrink:0;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

.todo-item.done .todo-checkbox {
  background:var(--accent);
  border-color:var(--accent);
  color:var(--bg);
}

.todo-text {
  flex:1;
  font-size:.95rem;
  line-height:1.4;
  word-break:break-word;
  color:var(--text);
}

.todo-item.done .todo-text {
  text-decoration:line-through;
  color:var(--text2);
}

.todo-meta {
  font-size:.72rem;
  color:var(--text2);
  margin-top:6px;
}

.todo-proof-btn {
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text2);
  padding:8px 14px;
  border-radius:10px;
  font-size:.8rem;
  cursor:pointer;
  margin-top:12px;
}

.todo-proof-media {
  width:100%;
  max-height:200px;
  border-radius:10px;
  object-fit:cover;
  margin-top:12px;
  cursor:pointer;
  border:1px solid var(--border);
  display:block;
}

.todo-empty {
  text-align:center;
  color:var(--text2);
  font-size:.85rem;
  padding:20px 0;
}

#lightbox {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.95);
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s;
}

#lightbox.open {
  opacity:1;
  pointer-events:all;
}

#lightbox img,
#lightbox video {
  max-width:90vw;
  max-height:85vh;
  object-fit:contain;
  border-radius:8px;
}

#lightbox .close-lb {
  position:absolute;
  top:52px;
  right:20px;
  background:none;
  border:none;
  color:#fff;
  font-size:2rem;
  cursor:pointer;
  z-index:101;
  padding:8px;
}

#lightbox .lb-nav {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:46px;
  height:46px;
  border-radius:50%;
  background:rgba(0,0,0,.35);
  border:none;
  color:#fff;
  font-size:1.8rem;
  cursor:pointer;
  z-index:101;
  display:none;
  align-items:center;
  justify-content:center;
}

#lightbox .lb-prev { left:12px; }
#lightbox .lb-next { right:12px; }

#lightbox .lb-counter {
  position:absolute;
  bottom:28px;
  left:50%;
  transform:translateX(-50%);
  color:rgba(255,255,255,.85);
  font-size:.78rem;
  background:rgba(0,0,0,.4);
  padding:4px 12px;
  border-radius:12px;
  display:none;
  z-index:101;
}

#incomingCall {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  z-index:200;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:1.5rem;
}

#incomingCall.show {
  display:flex;
}

.incoming-name {
  font-size:1.8rem;
  font-weight:300;
  color:var(--accent);
}

.incoming-type {
  font-size:.85rem;
  color:var(--text2);
}

.incoming-btns {
  display:flex;
  gap:40px;
  margin-top:1rem;
}

.inc-btn {
  width:72px;
  height:72px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
}

.inc-btn svg {
  width:28px;
  height:28px;
  stroke:#fff;
  fill:none;
  stroke-width:1.8;
}

.inc-btn span {
  font-size:.7rem;
  color:#fff;
}

.inc-btn.accept { background:#4a7a4a; }
.inc-btn.reject { background:var(--danger); }

.profile-header {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  padding:20px 0;
}

.profile-avatar-lg {
  width:88px;
  height:88px;
  border-radius:50%;
  background:var(--surface2);
  border:2px solid var(--border);
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2rem;
}

.profile-avatar-lg img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.profile-section {
  background:var(--surface);
  border-radius:16px;
  overflow:hidden;
}

.profile-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  gap:12px;
}

.profile-row:last-child {
  border-bottom:none;
}

.profile-row-label {
  font-size:.9rem;
  color:var(--text2);
}

.lang-select {
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--text);
  padding:6px 10px;
  font-size:.85rem;
  outline:none;
}

.danger-btn {
  background:none;
  border:1px solid var(--danger);
  border-radius:12px;
  color:var(--danger);
  padding:12px;
  font-size:.9rem;
  cursor:pointer;
  width:100%;
}

.toggle-sw {
  position:relative;
  width:44px;
  height:24px;
}

.toggle-sw input {
  opacity:0;
  width:0;
  height:0;
}

.toggle-sw .slider {
  position:absolute;
  inset:0;
  background:var(--surface2);
  border-radius:24px;
  border:1px solid var(--border);
  cursor:pointer;
}

.toggle-sw .slider::before {
  content:"";
  position:absolute;
  width:18px;
  height:18px;
  border-radius:50%;
  background:var(--text2);
  top:2px;
  left:2px;
  transition:transform .2s;
}

.toggle-sw input:checked + .slider {
  background:rgba(200,169,126,.2);
  border-color:var(--accent);
}

.toggle-sw input:checked + .slider::before {
  transform:translateX(20px);
  background:var(--accent);
}

.theme-row {
  display:flex;
  gap:12px;
  padding:4px 0;
  flex-wrap:wrap;
}

.theme-dot {
  width:40px;
  height:40px;
  border-radius:50%;
  cursor:pointer;
  border:3px solid transparent;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1rem;
}

.theme-dot.active {
  border-color:var(--accent);
  box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--accent);
}

.reply-bar {
  display:none;
  align-items:center;
  gap:8px;
  background:var(--surface2);
  border-left:3px solid var(--accent);
  padding:8px 14px;
  font-size:.8rem;
  color:var(--text2);
  flex-shrink:0;
}

.reply-bar.show {
  display:flex;
}

.reply-bar-text {
  flex:1;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}

.reply-bar-cancel {
  background:none;
  border:none;
  color:var(--text2);
  font-size:1.1rem;
  cursor:pointer;
}

.msg-quote {
  background:var(--surface2);
  border-left:3px solid var(--accent);
  border-radius:6px;
  padding:5px 10px;
  margin-bottom:5px;
  font-size:.75rem;
  color:var(--text2);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  max-width:100%;
}

.me .msg-quote {

  border-right:3px solid var(--accent2);
  text-align:right;
}

.scroll-bottom-btn {

  bottom:12px;
  right:12px;
  width:36px;
  height:36px;
  border-radius:50%;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text2);

  align-items:center;
  justify-content:center;
  z-index:5;
  font-size:1rem;
}

.scroll-bottom-btn.show {

}

.date-sep {

  font-size:.7rem;
  color:var(--text2);
  display:flex;
  align-items:center;
  gap:12px;
  width:100%;
}

}

.search-bar {

  gap:8px;
  align-items:center;
  padding:8px 12px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

.search-bar.show {
  display:flex;
}

.search-input {
  flex:1;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:18px;
  color:var(--text);
  padding:8px 14px;
  font-size:.85rem;
  outline:none;
}

.search-nav {
  background:none;
  border:none;
  color:var(--text2);
  font-size:1.1rem;
  cursor:pointer;
  padding:4px 6px;
}

.search-count {
  font-size:.75rem;
  color:var(--text2);
  white-space:nowrap;
}

.msg-highlight {
  background:rgba(200,169,126,.25);

}

#ctxMenu {

}

.ctx-item {

  align-items:center;
  gap:10px;
  padding:14px 18px;
  background:none;
  border:none;
  color:var(--text);
  font-size:.9rem;
  cursor:pointer;
  text-align:left;
  border-bottom:1px solid var(--border);
}

.ctx-item:last-child {

}

.ctx-item svg {
  width:18px;
  height:18px;
  stroke:currentColor;
  fill:none;
  stroke-width:1.8;
}

.archive-list {
  flex:1;
  overflow-y:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.archive-empty {
  flex:1;
  display:flex;

}

.archive-item {

.archive-item-meta {

  gap:8px;
  align-items:center;
}

.archive-item-sender {

}

.archive-item-text {
  font-size:.92rem;
  color:var(--text);
  line-height:1.5;
  word-break:break-word;
}

.archive-item-media {
  max-width:180px;
  border-radius:10px;
  overflow:hidden;
}

.archive-item-media img {
  width:100%;
  display:block;
  cursor:pointer;
}

.archive-del {
  position:absolute;
  top:10px;
  right:12px;
  background:none;
  border:none;
  color:var(--text2);
  font-size:1rem;
  cursor:pointer;
}

#toast {
  position:fixed;
  bottom:calc(80px + var(--safe-bottom));
  left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--surface2);
  border:1px solid var(--border);

  padding:10px 20px;
  font-size:.85rem;
  color:var(--text);
  z-index:300;
  opacity:0;
  pointer-events:none;
  white-space:nowrap;
  transition:opacity .2s,transform .2s;
}

#toast.show {
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
</style>

function sanitize(str) {
  if (!str) return "";
  if (String(str).startsWith("http://") || String(str).startsWith("https://")) return str;

  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#x27;");
}

    const count = Array.isArray(msg.items) ? msg.items.length : (msg.count || 0);

}

async function compressImageSafe(file, maxWidth = 1600) {
  if (!file.type.startsWith("image/") || file.type.includes("gif")) {
    return file;
  }

  return new Promise(resolve => {
    const img = new Image();
    const objectUrl = URL.createObjectURL(file);

    img.onload = () => {
      URL.revokeObjectURL(objectUrl);

      let width = img.width;
      let height = img.height;

      if (width > maxWidth) {
        height = Math.round((height * maxWidth) / width);
        width = maxWidth;
      }

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");

      if (file.type !== "image/png") {
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, width, height);
      }

      ctx.drawImage(img, 0, 0, width, height);

      const targetType = file.type === "image/png" ? "image/png" : "image/jpeg";
      const quality = targetType === "image/jpeg" ? .8 : undefined;

      canvas.toBlob(blob => {
        if (!blob) {
          resolve(file);
          return;
        }

        const ext = targetType === "image/png" ? ".png" : ".jpg";
        const safeName = `${file.name.replace(/\.[^/.]+$/, "")}_compressed${ext}`;

        try {
          resolve(new File([blob], safeName, {
            type: targetType,
            lastModified: Date.now()
          }));
        } catch {
          blob.name = safeName;
          resolve(blob);
        }
      }, targetType, quality);
    };

    img.onerror = () => {
      URL.revokeObjectURL(objectUrl);
      resolve(file);
    };

    img.src = objectUrl;
  });
}

  const container = document.getElementById("chatMessages");
  const messagesRef = ref(db, `${ROOM_ID}/messages`);

  let latestTheirTs = 0;
  let lastReadTimer = null;
  let initialLoadDone = false;
  let pressTimer;

  function updateMyLastRead(ts) {
    if (!ts || ts === window._myLastReadSent) return;

    clearTimeout(lastReadTimer);

    lastReadTimer = setTimeout(() => {
      window._myLastReadSent = ts;
      set(ref(db, `${ROOM_ID}/lastRead/${me.name}`), ts);
    }, 500);
  }

  container.addEventListener("touchstart", event => {
    const wrap = event.target.closest(".msg-wrap");
    if (!wrap?.dataset.key) return;

    const msg = window._loadedMessages[wrap.dataset.key];
    if (!msg || msg.type !== "text") return;

    pressTimer = setTimeout(() => {
      showCtxMenu(msg, wrap);
    }, 500);
  }, { passive:true });

  container.addEventListener("touchend", () => clearTimeout(pressTimer), { passive:true });
  container.addEventListener("touchmove", () => clearTimeout(pressTimer), { passive:true });

  container.addEventListener("dblclick", event => {
    const wrap = event.target.closest(".msg-wrap");
    if (!wrap?.dataset.key) return;

    const msg = window._loadedMessages[wrap.dataset.key];
    if (msg?.type === "text") window.setReply(msg);
  });

  const initialQuery = query(
    messagesRef,
    orderByKey(),
    limitToLast(50)
  );

  onChildAdded(initialQuery, snap => {
    const key = snap.key;

    if (seenKeys.has(key)) return;

    const msg = snap.val();
    const shouldStickToBottom = !initialLoadDone || isNearBottom(container);

    seenKeys.add(key);

    if (!oldestKey) {
      oldestKey = key;
    }

    renderMessage(msg, key, shouldStickToBottom);

    if (msg.uid !== me.name && msg.ts > latestTheirTs) {
      latestTheirTs = msg.ts;
      updateMyLastRead(msg.ts);

      if (msg.ts > enterTime) {
        sendLocalNotif(msg.name, mediaLabel(msg));
      }
    }

    clearTimeout(initialLoadTimer);

    initialLoadTimer = setTimeout(() => {
      if (initialLoadDone) return;

      initialLoadDone = true;
      window.scrollToLatest();
      setupHistoryScroll();
    }, 250);
  });

  onChildChanged(messagesRef, snap => {
    const key = snap.key;
    const msg = snap.val();

    if (window._loadedMessages[key]) {
      window._loadedMessages[key].translation = msg.translation;
    }

    const el = container.querySelector(`[data-key="${key}"]`);

    if (!el || !msg.translation || !translateEnabled) return;

    let translationEl = el.querySelector(".msg-translation");

    if (!translationEl) {

      }

      const timeEl = el.querySelector(".msg-time");

      if (timeEl) {
        el.insertBefore(translationEl, timeEl);
      } else {
        el.appendChild(translationEl);
      }
    }

    translationEl.textContent = msg.translation;
  });

  onValue(ref(db, `${ROOM_ID}/lastRead/${partner.name}`), snap => {
    partnerLastRead = snap.val() || 0;

    document.querySelectorAll(".read-check[data-ts]").forEach(el => {
      if (Number(el.dataset.ts) <= partnerLastRead) {
        el.className = "read-check read";

  onValue(ref(db, `${ROOM_ID}/media`), snap => {

  listenTodos();
  listenSignaling();
  listenArchive();

  if (avatarEl) {
    if (me.photoURL) {
      const img = document.createElement("img");
      img.src = me.photoURL;
      avatarEl.innerHTML = "";

  document.getElementById("myEmailDisplay").textContent = me.email;
  document.getElementById("langSelect").value = myLang;
  document.getElementById("translateToggle").checked = translateEnabled;

    if (!stickerPanelOpen) return;

function setupHistoryScroll() {
  const cm = document.getElementById("chatMessages");

  if (!cm || cm.dataset.historyScrollBound === "1") return;

  cm.dataset.historyScrollBound = "1";

  cm.addEventListener("scroll", () => {
    if (cm.scrollTop <= 120 && !loadingOlder && hasMoreOlder) {
      loadOlderMessages();
    }
  }, { passive:true });

  requestAnimationFrame(() => {
    if (cm.scrollHeight <= cm.clientHeight + 80 && hasMoreOlder) {
      loadOlderMessages();
    }
  });
}

async function loadOlderMessages() {
  if (loadingOlder || !hasMoreOlder || !oldestKey) return;

  loadingOlder = true;

  const cm = document.getElementById("chatMessages");
  const sentinel = document.getElementById("topSentinel");

  const beforeHeight = cm.scrollHeight;
  const beforeTop = cm.scrollTop;

  try {
    const messagesRef = ref(db, `${ROOM_ID}/messages`);

    const olderQuery = query(
      messagesRef,
      orderByKey(),
      endBefore(oldestKey),
      limitToLast(20)
    );

    const snapshot = await get(olderQuery);

    if (!snapshot.exists()) {
      hasMoreOlder = false;
      return;
    }

    const children = [];

    snapshot.forEach(child => {
      children.push({
        key: child.key,
        val: child.val()
      });
    });

    if (!children.length) {
      hasMoreOlder = false;
      return;
    }

    if (children.length < 20) {
      hasMoreOlder = false;
    }

    const fragment = document.createDocumentFragment();

    let previousDate = sentinel.nextElementSibling?.dataset?.date || "";

    for (const { key, val: msg } of children) {
      if (seenKeys.has(key)) continue;

      seenKeys.add(key);

      const dateStr = getDateStr(msg.ts);

      if (dateStr !== previousDate) {
        const sep = document.createElement("div");
        sep.className = "date-sep";
        sep.dataset.date = dateStr;
        sep.textContent = dateStr;
        fragment.appendChild(sep);

        previousDate = dateStr;
      }

      const wrap = createMessageElement(msg, key);
      wrap.dataset.date = dateStr;
      fragment.appendChild(wrap);
    }

    oldestKey = children[0].key;

    if (fragment.childNodes.length) {
      cm.insertBefore(fragment, sentinel.nextSibling);

      requestAnimationFrame(() => {
        cm.scrollTop = beforeTop + (cm.scrollHeight - beforeHeight);
      });
    }
  } catch (err) {
    console.error("과거 메시지 로드 실패:", err);
    showToast("과거 메시지를 불러오지 못했습니다.");
  } finally {
    loadingOlder = false;
  }
}

  grid.innerHTML = "";

  STICKER_DEFS.forEach(def => {
    const cell = document.createElement("div");
    cell.className = "sticker-cell";
    cell.dataset.file = def.file;

    const loading = document.createElement("div");
    loading.className = "sticker-loading";
    loading.textContent = "🍑";

    cell.appendChild(loading);
    cell.addEventListener("click", () => onStickerCellClick(def));

    grid.appendChild(cell);
  });
}

async function loadStickerUrlsFromStorage() {
  try {
    const result = await listAll(sRef(storage, STICKER_STORAGE_PATH));

    await Promise.all(result.items.map(async itemRef => {
      if (stickerUrlCache.has(itemRef.name)) return;

      try {
        const url = await getDownloadURL(itemRef);
        stickerUrlCache.set(itemRef.name, url);
      } catch (err) {
        console.warn("[Sticker] URL 로드 실패:", itemRef.name, err);
      }
    }));

    refreshStickerGrid();
  } catch (err) {
    console.warn("[Sticker] Storage 조회 실패:", err);
  }
}

function refreshStickerGrid() {
  const grid = document.getElementById("stickerGrid");
  if (!grid) return;

  STICKER_DEFS.forEach(def => {
    const cell = grid.querySelector(`[data-file="${def.file}"]`);
    const url = stickerUrlCache.get(def.file);

    if (!cell || !url || cell.querySelector("img")) return;

    cell.querySelector(".sticker-loading")?.remove();

    const img = document.createElement("img");
    img.src = url;
    img.alt = def.label;
    img.loading = "lazy";
    img.draggable = false;

    cell.appendChild(img);
  });
}

function onStickerCellClick(def) {
  const url = stickerUrlCache.get(def.file);

  if (!url) {
    showToast("스티커가 아직 준비되지 않았어요.");
    return;
  }

  sendSticker(def.file, def.label, url);
  closeStickerPanel();
}

function openStickerPanel() {
  const panel = document.getElementById("stickerPanel");
  const button = document.getElementById("stickerToggleBtn");

  stickerPanelOpen = true;
  button.classList.add("active");

  panel.style.display = "flex";

async function translate(text, src, tgt) {
  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${src}&tl=${tgt}&dt=t&q=${encodeURIComponent(text)}`;
    const res = await fetch(url);

    if (res.ok) {
      const data = await res.json();
      const translated = data?.[0]?.map(item => item?.[0]).filter(Boolean).join("");

      if (translated) return translated;
    }
  } catch {}

  return null;
}

function createMessageElement(msg, key) {
  if (msg.type === "system") {
    const wrap = document.createElement("div");
    wrap.className = "system-msg";
    wrap.dataset.key = key;
    wrap.textContent = msg.text || "";
    window._loadedMessages[key] = msg;
    return wrap;
  }

  const isMe = msg.uid === me.name;

  const wrap = document.createElement("div");
  wrap.className = `msg-wrap ${isMe ? "me" : "them"}`;
  wrap.dataset.key = key;

  if (!isMe) {
    const sender = document.createElement("div");
    sender.className = "msg-sender";

    if (msg.photoURL) {
      const img = document.createElement("img");
      img.src = msg.photoURL;
      img.style.cssText = "width:18px;height:18px;border-radius:50%;object-fit:cover;margin-right:4px;vertical-align:middle";

      sender.appendChild(img);
      sender.appendChild(document.createTextNode(` ${msg.name || ""}`));
    } else {
      sender.textContent = msg.name || "";
    }

    wrap.appendChild(sender);
  }

  if (msg.replyTo) {
    const quote = document.createElement("div");
    quote.className = "msg-quote";
    quote.textContent = `↩ ${msg.replyTo.text || mediaLabel(msg.replyTo)}`;
    wrap.appendChild(quote);
  }

  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";

  if (msg.type === "text") {
    const escapedText = String(msg.text || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#x27;");

    const urlRegex = /(https?:\/\/[^\s]+)/g;

    bubble.innerHTML = escapedText
      .replace(urlRegex, url =>
        `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color:var(--accent2);text-decoration:underline;word-break:break-all">${url}</a>`
      )
      .replace(/\n/g, "<br>");
  }

  if (msg.type === "sticker") {
    bubble.classList.add("msg-sticker-wrap");

    const img = document.createElement("img");
    img.className = "msg-sticker-img";
    img.alt = msg.stickerLabel || "스티커";
    img.loading = "lazy";
    img.src = msg.url || stickerUrlCache.get(msg.stickerFile) || "";

    if (img.src) {
      img.onclick = () => window.openLightbox("image", img.src);
    }

    bubble.appendChild(img);
  }

  if (msg.type === "image") {
    const media = document.createElement("div");
    media.className = "msg-media";

    const img = document.createElement("img");
    img.src = msg.url;
    img.loading = "lazy";
    img.onclick = () => window.openLightbox("image", msg.url);

    media.appendChild(img);
    bubble.appendChild(media);
  }

  if (msg.type === "video") {
    const media = document.createElement("div");
    media.className = "msg-media";

    const video = document.createElement("video");
    video.src = msg.url;
    video.controls = true;
    video.playsInline = true;

    media.appendChild(video);
    bubble.appendChild(media);
  }

  if (msg.type === "album") {
    const group = document.createElement("div");
    group.className = "msg-media-group";

    const items = Array.isArray(msg.items) ? msg.items : [];

    items.forEach((item, index) => {
      const cell = document.createElement("div");
      cell.className = "msg-media-group-item";

      if (item.type === "video") {
        const video = document.createElement("video");
        video.src = item.url;
        video.preload = "metadata";
        video.muted = true;
        video.playsInline = true;
        cell.appendChild(video);
      } else {
        const img = document.createElement("img");
        img.src = item.url;
        img.loading = "lazy";
        cell.appendChild(img);
      }

      if (items.length > 1) {
        const badge = document.createElement("div");
        badge.className = "msg-media-group-count";
        badge.textContent = `${index + 1}/${items.length}`;
        cell.appendChild(badge);
      }

      cell.onclick = () => {
        window.openLightbox(item.type, item.url, items, index);
      };

      group.appendChild(cell);
    });

    bubble.appendChild(group);
  }

  wrap.appendChild(bubble);

  if (msg.translation && translateEnabled && msg.type !== "sticker") {
    const translation = document.createElement("div");
    translation.className = "msg-translation";
    translation.textContent = msg.translation;
    wrap.appendChild(translation);
  }

  const time = document.createElement("div");
  time.className = "msg-time";
  time.appendChild(document.createTextNode(fmt(msg.ts)));

  if (isMe) {
    const check = document.createElement("span");
    check.dataset.ts = msg.ts;
    check.className = msg.ts <= partnerLastRead ? "read-check read" : "read-check unread";
    check.innerHTML = msg.ts <= partnerLastRead ? CHECK_DOUBLE : CHECK_SINGLE;
    time.appendChild(check);
  }

  wrap.appendChild(time);

  window._loadedMessages[key] = msg;

  return wrap;
}

function renderMessage(msg, key, stickToBottom = false) {
  const container = document.getElementById("chatMessages");

  if (container.querySelector(`[data-key="${key}"]`)) return;

  const wrap = createMessageElement(msg, key);
  const dateStr = getDateStr(msg.ts);

  wrap.dataset.date = dateStr;

  const messages = container.querySelectorAll(".msg-wrap,.system-msg");
  const lastMessage = messages.length ? messages[messages.length - 1] : null;

  if (!lastMessage || lastMessage.dataset.date !== dateStr) {
    const sep = document.createElement("div");
    sep.className = "date-sep";
    sep.dataset.date = dateStr;
    sep.textContent = dateStr;
    container.appendChild(sep);
  }

  container.appendChild(wrap);

  if (stickToBottom) {
    requestAnimationFrame(() => window.scrollToLatest());
  }
}

function uploadOneFile(file, progressPrefix = "") {
  return new Promise(async (resolve, reject) => {
    try {
      const targetFile = await compressImageSafe(file);
      const isVideo = targetFile.type.startsWith("video/");
      const safeName = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}_${targetFile.name || "media"}`;

      const task = uploadBytesResumable(
        sRef(storage, `${ROOM_ID}/${safeName}`),
        targetFile
      );

      task.on(
        "state_changed",
        snap => {
          showToast(`${progressPrefix}업로드 ${Math.round(snap.bytesTransferred / snap.totalBytes * 100)}%`);
        },
        reject,
        async () => {
          try {
            const url = await getDownloadURL(task.snapshot.ref);
            resolve({
              url,
              type: isVideo ? "video" : "image"
            });
          } catch (err) {
            reject(err);
          }
        }
      );
    } catch (err) {
      reject(err);
    }
  });
}

async function sendMediaGroup(files) {
  const items = [];
  const baseTs = Date.now();

  try {
    for (let i = 0; i < files.length; i++) {
      const { url, type } = await uploadOneFile(files[i], `(${i + 1}/${files.length}) `);

      items.push({ url, type });

      await push(ref(db, `${ROOM_ID}/media`), {
        uid: me.name,
        type,
        url,
        ts: baseTs + i
      });
    }

    await push(ref(db, `${ROOM_ID}/messages`), {
      uid: me.name,
      name: me.name,
      photoURL: me.photoURL || "",
      type: "album",
      items,
      ts: baseTs + files.length
    });

    showToast(`사진 ${files.length}장 공유 완료!`);
  } catch (err) {
    showToast(`실패: ${err.message}`);
  }
}

window.openLightbox = function(type, url, items, index = 0) {
  lightboxGallery =
    Array.isArray(items) && items.length > 1
      ? { items, index }
      : null;

  renderLightboxItem(type, url);
  updateLightboxNav();

  const lb = document.getElementById("lightbox");
  lb.classList.add("open");

  lb.onclick = event => {
    if (event.target === lb) window.closeLightbox();
  };
};

};

window.lightboxNav = function(direction) {
  if (!lightboxGallery) return;

  const length = lightboxGallery.items.length;

  lightboxGallery.index =
    (lightboxGallery.index + direction + length) % length;

  const item = lightboxGallery.items[lightboxGallery.index];

  renderLightboxItem(item.type, item.url);
  updateLightboxNav();
};

document.addEventListener("keydown", event => {
  const lb = document.getElementById("lightbox");

  if (!lb.classList.contains("open")) return;

  if (event.key === "Escape") {
    window.closeLightbox();
  }

  if (lightboxGallery && event.key === "ArrowLeft") {
    window.lightboxNav(-1);
  }

  if (lightboxGallery && event.key === "ArrowRight") {
    window.lightboxNav(1);
  }
});

function renderTodos(data) {
  const activeList = document.getElementById("todoActiveList");
  const doneList = document.getElementById("todoDoneList");

  activeList.innerHTML = "";
  doneList.innerHTML = "";

  if (!data) {
    activeList.innerHTML = `<div class="todo-empty">함께 하고 싶은 일을 추가해보세요!</div>`;
    doneList.innerHTML = `<div class="todo-empty">아직 해낸 일이 없어요</div>`;
    return;
  }

  const todos = Object.entries(data).map(([key, val]) => ({ key, ...val }));

  const active = todos
    .filter(item => !item.isDone)
    .sort((a, b) => b.createdAt - a.createdAt);

  const done = todos
    .filter(item => item.isDone)
    .sort((a, b) => b.completedAt - a.completedAt);

  if (!active.length) {
    activeList.innerHTML = `<div class="todo-empty">모든 버킷을 달성했어요!</div>`;
  } else {
    active.forEach(item => activeList.appendChild(createTodoEl(item)));
  }

  if (!done.length) {
    doneList.innerHTML = `<div class="todo-empty">아직 해낸 일이 없어요</div>`;
  } else {
    done.forEach(item => doneList.appendChild(createTodoEl(item)));
  }
}

function createTodoEl(todo) {
  const div = document.createElement("div");
  div.className = `todo-item ${todo.isDone ? "done" : ""}`;

  const check = document.createElement("div");
  check.className = "todo-checkbox";

  if (todo.isDone) {
    check.innerHTML = `<svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="3" fill="none"><polyline points="20 6 9 17 4 12"/></svg>`;
  } else {
    check.onclick = event => {
      event.currentTarget.style.pointerEvents = "none";
      window.toggleTodo(todo.key, todo.isDone, todo.text);
    };
  }

  const content = document.createElement("div");
  content.style.flex = "1";

  const text = document.createElement("div");
  text.className = "todo-text";
  text.textContent = todo.text;
  content.appendChild(text);

  if (todo.isDone) {
    const meta = document.createElement("div");
    meta.className = "todo-meta";
    meta.textContent = `${fmtFull(todo.completedAt)} 달성`;
    content.appendChild(meta);

    if (todo.proofUrl) {
      if (todo.proofType === "video") {
        const video = document.createElement("video");
        video.className = "todo-proof-media";
        video.src = todo.proofUrl;
        video.onclick = () => window.openLightbox("video", todo.proofUrl);
        content.appendChild(video);
      } else {
        const img = document.createElement("img");
        img.className = "todo-proof-media";
        img.src = todo.proofUrl;
        img.loading = "lazy";
        img.onclick = () => window.openLightbox("image", todo.proofUrl);
        content.appendChild(img);
      }
    } else {
      const btn = document.createElement("button");
      btn.className = "todo-proof-btn";
      btn.textContent = "📷 인증샷 남기기";
      btn.onclick = () => window.clickAddProof(todo.key);
      content.appendChild(btn);
    }
  }

  div.appendChild(check);
  div.appendChild(content);

  return div;
}

  const q = document.getElementById("searchInput").value.trim().toLowerCase();

  if (!q) {
    document.getElementById("searchCount").textContent = "";
    searchMatches = [];
    return;
  }

  searchMatches = [];

  document.querySelectorAll("#chatMessages .msg-bubble").forEach(el => {
    if (el.textContent.toLowerCase().includes(q)) {
      el.classList.add("msg-highlight");
      searchMatches.push(el);
    }
  });

  searchMatches.reverse();
  searchIdx = searchMatches.length ? 0 : -1;

  document.getElementById("searchCount").textContent =
    searchMatches.length ? `${searchIdx + 1}/${searchMatches.length}` : "0건";

  searchMatches[0]?.scrollIntoView({ block:"center" });
};

window.searchNext = function() {
  if (!searchMatches.length) return;

  searchIdx = (searchIdx + 1) % searchMatches.length;
  searchMatches[searchIdx].scrollIntoView({ block:"center" });

  document.getElementById("searchCount").textContent =
    `${searchIdx + 1}/${searchMatches.length}`;
};

window.searchPrev = function() {
  if (!searchMatches.length) return;

  searchIdx = (searchIdx - 1 + searchMatches.length) % searchMatches.length;
  searchMatches[searchIdx].scrollIntoView({ block:"center" });

  document.getElementById("searchCount").textContent =
    `${searchIdx + 1}/${searchMatches.length}`;
};

function clearSearch() {
  document.getElementById("searchInput").value = "";
  document.getElementById("searchCount").textContent = "";
  clearSearchHighlights();
  searchMatches = [];
  searchIdx = -1;
}

function clearSearchHighlights() {
  document.querySelectorAll(".msg-highlight").forEach(el => {
    el.classList.remove("msg-highlight");
  });
}

let ctxTargetMsg = null;
const ctxMenu = document.getElementById("ctxMenu");

function showCtxMenu(msg, wrap) {
  ctxTargetMsg = msg;

  const rect = wrap.getBoundingClientRect();
  const menuH = 100;

  let top = rect.bottom + 6;

  if (top + menuH > window.innerHeight - 20) {
    top = rect.top - menuH - 6;
  }

  ctxMenu.style.top = `${top}px`;

  if (msg.uid === me.name) {
    ctxMenu.style.right = `${window.innerWidth - rect.right}px`;
    ctxMenu.style.left = "auto";
  } else {
    ctxMenu.style.left = `${rect.left}px`;
    ctxMenu.style.right = "auto";
  }

  ctxMenu.classList.add("show");

  if (navigator.vibrate) {
    navigator.vibrate(30);
  }
}

function hideCtxMenu() {
  ctxMenu.classList.remove("show");
  ctxTargetMsg = null;
}

document.getElementById("ctxReply").addEventListener("click", () => {
  if (ctxTargetMsg) window.setReply(ctxTargetMsg);
  hideCtxMenu();
});

document.getElementById("ctxArchive").addEventListener("click", () => {
  if (ctxTargetMsg) saveToArchive(ctxTargetMsg);
  hideCtxMenu();
});

document.addEventListener("click", event => {
  if (ctxMenu.classList.contains("show") && !ctxMenu.contains(event.target)) {
    hideCtxMenu();
  }
});

function archivePath() {
  return `${ROOM_ID}/archive/${me.name}`;
}

async function saveToArchive(msg) {
  await push(ref(db, archivePath()), {
    text:msg.type === "sticker" ? `🍑 ${msg.stickerLabel || "스티커"}` : (msg.text || null),
    type:msg.type || "text",
    url:msg.url || null,
    name:msg.name || "",
    uid:msg.uid || "",
    ts:msg.ts || Date.now(),
    savedAt:Date.now()
  });

  showToast("보관함에 저장됐어요 🔖");
}

async function deleteFromArchive(key) {
  await set(ref(db, `${archivePath()}/${key}`), null);
}

function listenArchive() {
  onValue(ref(db, archivePath()), snap => {
    renderArchiveList(snap.val());
  });
}

function renderArchiveList(data) {
  const list = document.getElementById("archiveList");
  list.innerHTML = "";

  if (!data) {
    list.innerHTML = `<div class="archive-empty">보관된 메시지가 없어요</div>`;
    return;
  }

  Object.entries(data)
    .sort((a, b) => b[1].savedAt - a[1].savedAt)
    .forEach(([key, item]) => {
      const div = document.createElement("div");
      div.className = "archive-item";

      const meta = document.createElement("div");
      meta.className = "archive-item-meta";

      const sender = document.createElement("span");
      sender.className = "archive-item-sender";
      sender.textContent = item.name || "알 수 없음";

      const time = document.createElement("span");
      time.textContent = fmtFull(item.ts);

      meta.appendChild(sender);
      meta.appendChild(time);
      div.appendChild(meta);

      if (item.type === "text" && item.text) {
        const p = document.createElement("div");
        p.className = "archive-item-text";
        p.textContent = item.text;
        div.appendChild(p);
      }

      if ((item.type === "image" || item.type === "video" || item.type === "sticker") && item.url) {
        const wrap = document.createElement("div");
        wrap.className = "archive-item-media";

        if (item.type === "video") {
          const video = document.createElement("video");
          video.src = item.url;
          video.controls = true;
          video.playsInline = true;
          wrap.appendChild(video);
        } else {
          const img = document.createElement("img");
          img.src = item.url;
          img.loading = "lazy";
          img.onclick = () => window.openLightbox("image", item.url);
          wrap.appendChild(img);
        }

        div.appendChild(wrap);
      }

      const del = document.createElement("button");
      del.className = "archive-del";
      del.textContent = "✕";
      del.onclick = () => deleteFromArchive(key);

      div.appendChild(del);
      list.appendChild(div);
    });
}

window.showToast = function(message) {
  const toast = document.getElementById("toast");

  toast.textContent = message;
  toast.classList.add("show");

  clearTimeout(window._toastTimer);

  window._toastTimer = setTimeout(() => {
    toast.classList.remove("show");
  }, 2500);
};

document.addEventListener("DOMContentLoaded", () => {
  const cm = document.getElementById("chatMessages");
  const btn = document.getElementById("scrollBottomBtn");

  cm.addEventListener("scroll", () => {
    btn.classList.toggle("show", !isNearBottom(cm));
  }, { passive:true });
});
</script>
